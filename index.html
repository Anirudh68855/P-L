    <script type="text/babel">

      const Radar = Lib.Radar || (() => null);
      const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRk_7uILshEOrsvZsMZgDEYQLFJXWxXjV0jGJQ2lyXmMdJnyZdiweYwASZHaug7rw00HzvDjRKq3g_N/pub?gid=1929643988&single=true&output=csv";

      // Lovable Cloud (Supabase) REST config — used to persist manual entries permanently
      const SUPABASE_URL = "https://oqlumqqjnkkavqnjzbxy.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xbHVtcXFqbmtrYXZxbmp6Ynh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NjA5NTMsImV4cCI6MjA5MzQzNjk1M30.SS7WqQEMhsojmTEZpSF_2lH84DR6UDAn6KfqQwRbH6Q";
      const sbHeaders = {
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
          "Content-Type": "application/json"
      };
      const fetchOverrides = async (year, month) => {
          const url = `${SUPABASE_URL}/rest/v1/manual_overrides?year=eq.${encodeURIComponent(year)}&month=eq.${encodeURIComponent(month)}&select=bu_key,field,value`;
          try {
              const r = await fetch(url, { headers: sbHeaders });
              if (!r.ok) return [];
              return await r.json();
          } catch (e) { console.error("fetchOverrides failed", e); return []; }
      };
      const fetchAllOverridesForYear = async (year) => {
          const url = `${SUPABASE_URL}/rest/v1/manual_overrides?year=eq.${encodeURIComponent(year)}&select=month,bu_key,field,value`;
          try {
              const r = await fetch(url, { headers: sbHeaders });
              if (!r.ok) return [];
              return await r.json();
          } catch (e) { console.error("fetchAllOverridesForYear failed", e); return []; }
      };
      const saveOverride = async (year, month, bu_key, field, value) => {
          const url = `${SUPABASE_URL}/rest/v1/manual_overrides?on_conflict=year,month,bu_key,field`;
          try {
              await fetch(url, {
                  method: "POST",
                  headers: { ...sbHeaders, "Prefer": "resolution=merge-duplicates,return=minimal" },
                  body: JSON.stringify({ year, month, bu_key, field, value })
              });
          } catch (e) { console.error("saveOverride failed", e); }
      };

      const SUB_BUS = [
          { key: "dom_fruits", name: "Domestic Fruits", short: "Dom. Fruits" },
          { key: "pomo_ka", name: "Pomo KA", short: "Pomo KA" },
          { key: "ka_cc", name: "KA CC", short: "KA CC" },
          { key: "pomo_mh", name: "Pomo MH", short: "Pomo MH" },
          { key: "mh_cc", name: "MH CC", short: "MH CC" },
          { key: "pomo_rj_gj", name: "Pomo RJ/GJ", short: "Pomo RJ/GJ" },
          { key: "mango", name: "Mango", short: "Mango" },
          { key: "shimla_apple_fresh", name: "Shimla Apple - Fresh", short: "Apple Fresh" },
          { key: "shimla_apple_ca", name: "Shimla Apple CA", short: "Apple CA" },
          { key: "others", name: "Others (Known Pair)", short: "Others" },
      ];

      // Robust CSV Parser helper
      const parseCSV = (text) => {
          const lines = text.split(/\r?\n/);
          if (lines.length < 2) return [];
          const headers = lines[0].split(',').map(h => h.trim());
          return lines.slice(1).map(line => {
              const values = [];
              let current = '';
              let inQuotes = false;
              for (let i = 0; i < line.length; i++) {
                  const char = line[i];
                  if (char === '"') inQuotes = !inQuotes;
                  else if (char === ',' && !inQuotes) {
                      values.push(current.trim());
                      current = '';
                  } else current += char;
              }
              values.push(current.trim());
              return headers.reduce((obj, header, index) => {
                  let val = values[index] || "";
                  // Clean numeric strings like "408,168"
                  if (typeof val === 'string') val = val.replace(/^"|"$/g, '').replace(/,/g, '');
                  obj[header] = val;
                  obj._rawValues = values; // Store raw values for index-based access
                  return obj;
              }, {});
          });
      };

      const compute = (i) => {
          const gmv = parseFloat(i.gmv) || 0;
          const margin = parseFloat(i.margin) || 0;
          const dncn = parseFloat(i.dncn) || 0;
          // Gross Trade Margin is ALWAYS derived = Margin + DN & CN (never read raw, no override)
          const grossTradeMargin = margin + dncn;
          const grossTradeMarginPct = gmv ? (grossTradeMargin / gmv) * 100 : 0;
          const storageLogistics = parseFloat(i.storageLogistics) || 0;
          const workingCapital = parseFloat(i.workingCapital) || 0;
          const capitalCredit = parseFloat(i.capitalCredit) || 0;
          const marginOtherBU = parseFloat(i.marginOtherBU) || 0;
          const netTradeMargin = grossTradeMargin - storageLogistics - workingCapital - capitalCredit + marginOtherBU;
          const netTradeMarginPct = gmv ? (netTradeMargin / gmv) * 100 : 0;
          const cm2Costs = parseFloat(i.cm2Costs) || 0;
          const cm2 = netTradeMargin - cm2Costs;
          const manpower = parseFloat(i.manpower) || 0;
          const travel = parseFloat(i.travel) || 0;
          const other = parseFloat(i.other) || 0;
          const cm3Costs = manpower + travel + other;
          const cm3 = cm2 - cm3Costs;
          const cm3Pct = gmv ? (cm3 / gmv) * 100 : 0;
          const badDebts = parseFloat(i.badDebts) || 0;
          const provReversal = parseFloat(i.provReversal) || 0;
          const netCM3 = cm3 - badDebts + provReversal;
          const netCM3Pct = gmv ? (netCM3 / gmv) * 100 : 0;
          return {
              gmv, margin, dncn, grossTradeMargin, grossTradeMarginPct,
              storageLogistics, workingCapital, capitalCredit, marginOtherBU,
              netTradeMargin, netTradeMarginPct,
              cm2Costs, cm2, cm3Costs, manpower, travel, other, cm3, cm3Pct,
              badDebts, provReversal, netCM3, netCM3Pct
          };
      };

      const aggregate = (results) => {
          const fields = [
              'gmv', 'grossTradeMargin', 'storageLogistics', 'workingCapital',
              'capitalCredit', 'marginOtherBU', 'cm2Costs', 'manpower',
              'travel', 'other', 'badDebts', 'provReversal'
          ];
          const base = {};
          fields.forEach(f => {
              base[f] = results.reduce((sum, r) => sum + (r[f] || 0), 0);
          });
          return compute(base);
      };

      const fmtL = (val, dec = 1) => {
          const n = Number(val);
          if (!isFinite(n)) return "₹0.0L";
          const isNeg = n < 0;
          const absVal = Math.abs(n);
          const str = `₹${absVal.toLocaleString("en-IN", { minimumFractionDigits: dec, maximumFractionDigits: dec })}L`;
          return isNeg ? `(${str})` : str;
      };
      const fmtPct = (val) => {
          const n = Number(val);
          if (!isFinite(n)) return "0.0%";
          const rounded = Math.round(n * 10) / 10;
          return `${rounded.toFixed(1)}%`;
      };

      const Icon = ({ name, size = 16, className = "", onClick }) => {
          const icons = {

              zap: <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />,
              eye: <Fragment><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /></Fragment>,
              target: <Fragment><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" /></Fragment>,
              pie: <Fragment><path d="M21.21 15.89A10 10 0 1 1 8 2.83" /><path d="M22 12A10 10 0 0 0 12 2v10z" /></Fragment>,
              tweak: <Fragment><line x1="4" y1="21" x2="4" y2="14" /><line x1="4" y1="10" x2="4" y2="3" /><line x1="12" y1="21" x2="12" y2="12" /><line x1="12" y1="8" x2="12" y2="3" /><line x1="20" y1="21" x2="20" y2="16" /><line x1="20" y1="12" x2="20" y2="3" /><line x1="2" y1="14" x2="6" y2="14" /><line x1="10" y1="8" x2="14" y2="8" /><line x1="18" y1="16" x2="22" y2="16" /></Fragment>,
              download: <Fragment><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></Fragment>,
              spreadsheet: <Fragment><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><path d="M14 2v6h6" /></Fragment>,
              file: <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />,
              printer: <Fragment><path d="M6 9V2h12v7" /><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" /><path d="M6 14h12v8H6z" /></Fragment>,
              search: <Fragment><circle cx="11" cy="11" r="8" /><path d="M21 21l-4.35-4.35" /></Fragment>,
              settings: <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />,
              bell: <Fragment><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" /><path d="M13.73 21a2 2 0 0 1-3.46 0" /></Fragment>,
              "file-spreadsheet": <Fragment><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><path d="M14 2v6h6" /><path d="M8 13h2" /><path d="M14 13h2" /><path d="M8 17h2" /><path d="M14 17h2" /></Fragment>,
              "file-text": <Fragment><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><path d="M14 2v6h6" /><path d="M8 13h8" /><path d="M8 17h8" /></Fragment>,
              "check-circle": <Fragment><circle cx="12" cy="12" r="10" /><path d="M9 12l2 2 4-4" /></Fragment>,
                user: <Fragment><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></Fragment>,
              "trending-up": <Fragment><polyline points="23 6 13.5 15.5 8.5 10.5 1 18" /><polyline points="17 6 23 6 23 12" /></Fragment>,
              "bar-chart": <Fragment><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></Fragment>,
              wallet: <Fragment><path d="M21 12V7a2 2 0 0 0-2-2H5a2 2 0 0 0 0 4h16v4"/><path d="M3 7v12a2 2 0 0 0 2 2h16v-5"/><circle cx="17" cy="14" r="1.5"/></Fragment>,
              percent: <Fragment><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></Fragment>,
              award: <Fragment><circle cx="12" cy="8" r="6"/><path d="M15.5 12.5L17 22l-5-3-5 3 1.5-9.5"/></Fragment>,
              coins: <Fragment><circle cx="9" cy="9" r="6"/><path d="M21 15a6 6 0 1 1-9.33 5"/><path d="M7 9h.01"/><path d="M11 9h.01"/></Fragment>
          };
          return (
              <svg onClick={onClick} viewBox="0 0 24 24" fill="none" stroke={name === 'logo' ? undefined : "currentColor"} strokeWidth={name === 'logo' ? "3" : "2.5"} strokeLinecap="round" strokeLinejoin="round" style={{width: size, height: size}} className={`${className} ${onClick ? 'cursor-pointer' : ''}`}>
                  {icons[name] || icons.menu}
              </svg>
          );
      };

      const CustomSelect = ({ value, options, onChange, className = "", icon, data }) => {
          const [isOpen, setIsOpen] = useState(false);
          const triggerRef = ReactGlobal.useRef(null);
          const dropdownRef = ReactGlobal.useRef(null);
          const [coords, setCoords] = useState({ top: 0, left: 0, width: 0 });

          const selected = options.find(o => o.key === value || o === value);
          const selectedLabel = typeof selected === 'object' ? selected.name : (selected || value);

          const getInsight = (key, buData) => {
              if (!buData) return null;
              if (buData.netCM3Pct > 5) return { label: "Top", color: "emerald" };
              if (buData.netCM3Pct < 0) return { label: "Risk", color: "rose" };
              if (buData.gmv > 100) return { label: "Scale", color: "indigo" };
              return { label: "Stable", color: "slate" };
          };

          const toggle = () => {
              if (!isOpen && triggerRef.current) {
                  const rect = triggerRef.current.getBoundingClientRect();
                  const spaceRight = window.innerWidth - rect.left;
                  const modalWidth = 280; // Estimated max width

                  let left = rect.left;
                  if (spaceRight < modalWidth) {
                      left = rect.right - modalWidth;
                  }

                  setCoords({
                      top: rect.bottom + 8,
                      left: Math.max(16, left),
                      width: Math.max(modalWidth, rect.width)
                  });
              }
              setIsOpen(!isOpen);
          };

          useEffect(() => {
              if (!isOpen) return;
              const handleScroll = (e) => {
                  if (dropdownRef.current && dropdownRef.current.contains(e.target)) return;
                  setIsOpen(false);
              };
              window.addEventListener('scroll', handleScroll, { capture: true });
              return () => window.removeEventListener('scroll', handleScroll, { capture: true });
          }, [isOpen]);

          return (
              <div className={`${className}`} ref={triggerRef}>
                  <div
                      onClick={toggle}
                      className="flex items-center justify-between cursor-pointer group hover:bg-black/5 p-2 -m-2 rounded-xl transition-all"
                  >
                      <div className="flex items-center gap-2">
                          {icon && <Icon name={icon} size={14} className="text-slate-400" />}
                          <span className="font-black truncate">{selectedLabel}</span>
                      </div>
                      <Icon name="chevron" size={12} className="text-slate-400 opacity-0 group-hover:opacity-100 transition-all" />
                  </div>

                  {isOpen && window.ReactDOM.createPortal(
                      <div className="fixed inset-0 z-[10000] animate-fade-in">
                          <div className="absolute inset-0" onClick={() => setIsOpen(false)}></div>
                          <div
                              ref={dropdownRef}
                              style={{
                                  position: 'fixed',
                                  top: coords.top,
                                  left: coords.left,
                                  width: coords.width,
                                  maxWidth: '320px'
                              }}
                              className="bg-white border border-black/5 rounded-[24px] shadow-2xl overflow-hidden animate-zoom-in-fast flex flex-col origin-top-left"
                          >
                              <div className="p-4 border-b border-slate-100 flex items-center justify-between bg-white sticky top-0 z-10">
                                  <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Select {icon === 'filter' ? 'Region' : 'Option'}</h3>
                                  <button onClick={() => setIsOpen(false)} className="p-1 hover:bg-slate-100 rounded-lg transition-colors">
                                      <Icon name="x" size={14} className="text-slate-400" />
                                  </button>
                              </div>
                              <div className="p-1.5 space-y-0.5 overflow-y-auto custom-scrollbar max-h-[40vh]">
                                  {options.map((opt, i) => {
                                      const key = typeof opt === 'object' ? opt.key : opt;
                                      const label = typeof opt === 'object' ? opt.name : opt;
                                      const isActive = key === value;
                                      const buStats = data ? data[key] : null;
                                      const insight = getInsight(key, buStats);

                                      return (
                                          <div
                                              key={i}
                                              onClick={() => { onChange(key); setIsOpen(false); }}
                                              className={`px-3 py-2.5 rounded-xl transition-all cursor-pointer flex items-center justify-between ${isActive ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-50'}`}
                                          >
                                              <div className="flex flex-col">
                                                  <div className="flex items-center gap-2">
                                                      <span className="text-[11px] font-black">{label}</span>
                                                      {insight && !isActive && (
                                                          <span className={`text-[7px] font-black uppercase tracking-tighter px-1 py-0.5 rounded-md bg-${insight.color}-100 text-${insight.color}-600`}>
                                                              {insight.label}
                                                          </span>
                                                      )}
                                                  </div>
                                                  {buStats && (
                                                      <span className={`text-[8px] font-bold mt-0.5 ${isActive ? 'text-white/70' : 'text-slate-400'}`}>
                                                          {fmtPct(buStats.netCM3Pct)} · {fmtL(buStats.gmv)}
                                                      </span>
                                                  )}
                                              </div>
                                              {isActive && <Icon name="check" size={12} />}
                                          </div>
                                      );
                                  })}
                              </div>
                          </div>
                      </div>,
                      document.body
                  )}
              </div>
          );
      };
      const Drawer = ({ isOpen, onClose, inputs, activeData, activeBu, onBuChange, onUpdate, computedData }) => {
          if (!isOpen) return null;
          const isAggregate = activeBu === 'dom_fruits';
          const rawBu = activeData[activeBu] || {};
          const overridesBu = inputs[activeBu] || {};
          const computedBu = (computedData && computedData[activeBu]) || {};
          // These three values can come from manual DB entries or aggregate distribution.
          // The computed object is the single source of truth for what the table shows,
          // so the drawer must read from it too instead of falling back to stale raw rows.
          const displayedCost = (field) => computedBu[field] ?? rawBu[field] ?? 0;
          const buData = {
              gmv: 0, margin: 0, dncn: 0, grossTradeMargin: 0, storageLogistics: 0,
              workingCapital: 0, capitalCredit: 0, marginOtherBU: 0, cm2Costs: 0,
              manpower: 0, travel: 0, other: 0, badDebts: 0, provReversal: 0,
              ...rawBu,
              cm2Costs: displayedCost('cm2Costs'),
              workingCapital: displayedCost('workingCapital'),
              capitalCredit: displayedCost('capitalCredit'),
          };

          const InputField = ({ label, field, val, readOnly }) => {
              const isDisabled = !!readOnly;
              const displayVal = val;

              const [draft, setDraft] = React.useState(Number(displayVal || 0).toFixed(2));
              const [editing, setEditing] = React.useState(false);
              React.useEffect(() => { if (!editing) setDraft(Number(displayVal || 0).toFixed(2)); }, [displayVal, editing]);
              React.useEffect(() => {
                  setEditing(false);
                  setDraft(Number(displayVal || 0).toFixed(2));
              }, [activeBu, field]);

              const commit = () => {
                  setEditing(false);
                  const n = parseFloat(draft);
                  if (!isNaN(n)) onUpdate(activeBu, field, n);
                  else setDraft(Number(displayVal || 0).toFixed(2));
              };

              return (
                  <div className={`flex flex-col gap-1 ${isDisabled ? 'opacity-60' : ''}`}>
                      <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">
                          {label}
                      </label>
                      <div className={`flex items-center bg-slate-50 border border-slate-100 rounded-xl px-3 py-2 transition-all ${isDisabled ? 'cursor-not-allowed bg-slate-100/50' : 'focus-within:border-slate-900 focus-within:bg-white'}`}>
                          <span className="text-slate-400 text-xs mr-2 font-bold">₹</span>
                          <input
                              type="text"
                              inputMode="decimal"
                              value={draft}
                              disabled={isDisabled}
                              onFocus={(e) => { if (!isDisabled) { setEditing(true); e.currentTarget.select(); } }}
                              onChange={(e) => {
                                  const next = e.target.value;
                                  if (/^-?\d*\.?\d*$/.test(next)) setDraft(next);
                              }}
                              onBlur={commit}
                              onKeyDown={(e) => {
                                  if (e.key === 'Enter') e.currentTarget.blur();
                                  if (e.key === 'Escape') { setDraft(Number(displayVal || 0).toFixed(2)); setEditing(false); e.currentTarget.blur(); }
                              }}
                              className="bg-transparent text-sm font-bold text-slate-900 outline-none w-full disabled:cursor-not-allowed"
                          />
                          <span className="text-slate-400 text-[10px] ml-2 font-bold uppercase">L</span>
                      </div>
                  </div>
              );
          };

          return (
              <div className="fixed inset-0 z-[2000] flex justify-start">
                  <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={onClose}></div>
                  <div className="relative w-full max-w-lg bg-white h-full shadow-hover flex flex-col animate-slide-left">
                      <div className="p-6 border-b border-slate-100 flex items-center justify-between sticky top-0 bg-white z-10">
                          <div className="flex items-center gap-3"><h2 className="text-lg font-black text-slate-900">Inputs & Filters</h2></div>
                          <div className="flex items-center gap-4"><button className="text-xs font-bold text-slate-400 hover:text-slate-900">Reset</button><button onClick={onClose} className="p-2 hover:bg-slate-100 rounded-xl transition-colors"><Icon name="x" size={18} className="text-slate-400" /></button></div>
                      </div>
                      <div className="flex items-center gap-4 px-6 py-4 overflow-x-auto custom-scrollbar border-b border-slate-50">
                          {SUB_BUS.map(bu => (<button key={bu.key} onClick={() => onBuChange(bu.key)} className={`whitespace-nowrap px-4 py-2 rounded-xl text-[10px] font-black transition-all ${activeBu === bu.key ? 'bg-slate-900 text-white' : 'text-slate-400 hover:text-slate-900'}`}>{bu.name}</button>))}
                      </div>
                      <div className="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-8">
                          <div className="space-y-1">
                              <span className="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em]">Sub BU</span>
                              <h3 className="text-2xl font-black text-slate-900 flex items-center gap-2">
                                  {SUB_BUS.find(b => b.key === activeBu).name}
                                  {isAggregate && <span className="text-[10px] bg-indigo-50 text-indigo-500 px-2 py-0.5 rounded-full font-bold">CALCULATED TOTAL</span>}
                              </h3>
                              {isAggregate && <p className="text-[10px] text-slate-400 font-medium">This vertical is the aggregate of all sub-BUs. Edit individual BUs to change these values.</p>}
                          </div>
                          <div className="p-6 rounded-3xl border border-slate-100 space-y-6 relative"><div className="absolute -top-3 left-6 bg-white px-3 text-[10px] font-black text-slate-400 uppercase tracking-widest border border-slate-100 rounded-full">Gross Margin</div><div className="grid grid-cols-2 gap-6"><InputField label="GMV" field="gmv" val={buData.gmv} /><InputField label="Base Margin" field="margin" val={buData.margin} /><InputField label="DN & CN" field="dncn" val={buData.dncn} /><InputField label="Gross Trade Margin (= Margin + DN & CN)" field="grossTradeMargin" val={(parseFloat(buData.margin)||0) + (parseFloat(buData.dncn)||0)} readOnly /></div></div>
                          <div className="p-6 rounded-3xl border border-slate-100 space-y-6 relative"><div className="absolute -top-3 left-6 bg-white px-3 text-[10px] font-black text-slate-400 uppercase tracking-widest border border-slate-100 rounded-full">CM1 Adjustments</div><div className="grid grid-cols-2 gap-6"><InputField label="Other costs (Storage & Logistics)" field="storageLogistics" val={buData.storageLogistics} /><InputField label="Working Capital Cost" field="workingCapital" val={buData.workingCapital} /><InputField label="Capital Credit Cost (1%)" field="capitalCredit" val={buData.capitalCredit} /><InputField label="Margin from Other BUs (+)" field="marginOtherBU" val={buData.marginOtherBU} /></div></div>
                          <div className="p-6 rounded-3xl border border-slate-100 space-y-6 relative"><div className="absolute -top-3 left-6 bg-white px-3 text-[10px] font-black text-slate-400 uppercase tracking-widest border border-slate-100 rounded-full">CM2</div><InputField label="CM2 Costs" field="cm2Costs" val={buData.cm2Costs} /></div>
                          <div className="p-6 rounded-3xl border border-slate-100 space-y-6 relative"><div className="absolute -top-3 left-6 bg-white px-3 text-[10px] font-black text-slate-400 uppercase tracking-widest border border-slate-100 rounded-full">CM3</div><div className="grid grid-cols-2 gap-6"><InputField label="Manpower Cost" field="manpower" val={buData.manpower} /><InputField label="Travel Cost" field="travel" val={buData.travel} /><InputField label="Other Cost" field="other" val={buData.other} /></div></div>
                          <div className="p-6 rounded-3xl border border-slate-100 space-y-6 relative"><div className="absolute -top-3 left-6 bg-white px-3 text-[10px] font-black text-slate-400 uppercase tracking-widest border border-slate-100 rounded-full">Provisions</div><div className="grid grid-cols-2 gap-6"><InputField label="Bad Debts / Advances Provision" field="badDebts" val={buData.badDebts} /><InputField label="Provision Reversal (+)" field="provReversal" val={buData.provReversal} /></div></div>
                      </div>
                      <div className="p-6 border-t border-slate-100 flex gap-4"><button onClick={onClose} className="flex-1 py-3 bg-slate-900 text-white rounded-2xl text-xs font-black hover:bg-slate-800 transition-all shadow-premium">Apply & Close</button></div>
                  </div>
              </div>
          );
      };

      const MetricModal = ({ isOpen, onClose, metric, data, fmt, onSelectBu }) => {
          if (!isOpen || !metric) return null;

          const chartData = SUB_BUS.filter(b => b.key !== 'dom_fruits').map(bu => {
              const val = data[bu.key] ? (data[bu.key][metric.field] || 0) : 0;
              return {
                  key: bu.key,
                  name: bu.short,
                  value: val,
                  fullName: bu.name
              };
          }).sort((a,b) => Math.abs(b.value) - Math.abs(a.value));

          return (
              <div className="fixed inset-0 z-[3000] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={onClose}></div>
                  <div className="relative bg-white w-full max-w-4xl rounded-[40px] shadow-premium overflow-hidden animate-zoom-in max-h-[90vh] flex flex-col border border-black/5">
                      <div className="p-8 border-b border-slate-100 flex items-center justify-between flex-shrink-0 bg-slate-50/50">
                          <div>
                              <span className="text-[10px] font-black text-indigo-600 uppercase tracking-[0.2em] mb-1 block">Metric Analysis</span>
                              <h2 className="text-3xl font-black text-slate-900 tracking-tighter">{metric.label} Breakdown</h2>
                          </div>
                          <button onClick={onClose} className="p-3 hover:bg-slate-100 rounded-2xl transition-colors">
                              <Icon name="x" size={24} className="text-slate-400" />
                          </button>
                      </div>
                      <div className="flex-1 overflow-y-auto custom-scrollbar p-8">
                          <div className="bg-slate-50 rounded-[32px] p-8 mb-8 border border-slate-100">
                              <div className="flex items-end justify-between gap-2 h-[300px] px-4">
                                  {chartData.map((item, idx) => {
                                      const maxVal = Math.max(...chartData.map(d => Math.abs(d.value))) || 1;
                                      const height = (Math.abs(item.value) / maxVal) * 100;
                                      return (
                                          <div key={idx} onClick={() => onSelectBu(item.key)} className="flex-1 flex flex-col items-center group relative h-full justify-end cursor-pointer">
                                              <div className="absolute -top-12 opacity-0 group-hover:opacity-100 transition-all duration-300 pointer-events-none z-10">
                                                  <div className="bg-slate-900 text-white text-[10px] font-black px-3 py-1.5 rounded-lg shadow-xl whitespace-nowrap">
                                                      {item.fullName}: {fmt(item.value)}
                                                  </div>
                                                  <div className="w-2 h-2 bg-slate-900 rotate-45 mx-auto -mt-1"></div>
                                              </div>
                                              <div className="absolute -top-6 text-[10px] font-black text-slate-900">
                                                  {fmt(item.value)}
                                              </div>
                                              <div
                                                  style={{ height: `${height}%` }}
                                                  className={`w-full max-w-[40px] rounded-t-xl transition-all duration-500 ease-out hover:brightness-110 cursor-pointer ${item.value >= 0 ? 'bg-gradient-to-t from-indigo-600 to-indigo-400' : 'bg-gradient-to-t from-rose-600 to-rose-400'}`}
                                              ></div>

                      <div className="bg-slate-50 p-6 flex justify-center flex-shrink-0 border-t border-slate-100">

      };

      const BuDetailModal = ({ isOpen, onClose, buKey, data }) => {
          if (!isOpen || !buKey) return null;
          const bu = SUB_BUS.find(b => b.key === buKey);
          const d = data[buKey];

          const DetailRow = ({ label, val, isPct, isBold, isNegative }) => (
              <div className={`flex justify-between items-center py-4 border-b border-slate-100 ${isBold ? 'bg-indigo-50 -mx-8 px-8' : ''}`}>
                  <span className={`text-xs ${isBold ? 'font-black text-slate-900' : 'font-medium text-slate-500'}`}>{label}</span>
                  <span className={`text-sm font-black ${isNegative ? 'text-rose-600' : (isBold ? 'text-indigo-600' : 'text-slate-900')}`}>
                      {isPct ? fmtPct(val) : fmtL(val)}
                  </span>
              </div>
          );

          return (
              <div className="fixed inset-0 z-[4000] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={onClose}></div>
                  <div className="relative bg-white border border-black/5 w-full max-w-xl rounded-[40px] shadow-premium overflow-hidden flex flex-col animate-zoom-in max-h-[90vh]">
                      <div className="p-8 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                          <div>
                              <span className="text-[10px] font-black text-indigo-600 uppercase tracking-[0.2em] mb-1 block">Regional Drill-down</span>

                      </div>
                      <div className="flex-1 overflow-y-auto custom-scrollbar p-8 space-y-1">
                          <DetailRow label="Total Sales (GMV)" val={d.gmv} isBold />
                          <DetailRow label="Gross Trade Margin" val={d.grossTradeMargin} />
                          <DetailRow label="Gross Trade Margin %" val={d.grossTradeMarginPct} isPct />
                          <DetailRow label="(-) Other costs (Storage & Logistics)" val={d.storageLogistics} isNegative />
                          <DetailRow label="(-) Working Capital Cost" val={d.workingCapital} isNegative />
                          <DetailRow label="(-) Capital/Credit Cost (1%)" val={d.capitalCredit} isNegative />
                          <DetailRow label="Net Trade Margin" val={d.netTradeMargin} isBold />
                          <DetailRow label="Net Trade Margin %" val={d.netTradeMarginPct} isPct />
                          <DetailRow label="(-) CM2 Costs" val={d.cm2Costs} isNegative />
                          <DetailRow label="CM2 Performance" val={d.cm2} isBold />
                          <DetailRow label="(-) Manpower & Travel" val={d.cm3Costs} isNegative />
                          <DetailRow label="CM3 Performance" val={d.cm3} isBold />
                          <DetailRow label="CM3 %" val={d.cm3Pct} isPct />
                          <DetailRow label="Net CM3 (After Provisions)" val={d.netCM3} isBold />
                          <DetailRow label="Final Net CM3 %" val={d.netCM3Pct} isPct />
                      </div>
                      <div className="p-6 bg-slate-50 border-t border-slate-100 flex gap-4">

                      </div>
                  </div>
              </div>

      };

      const KPI = ({ label, val, trend, isPos, sub, onClick, color = "indigo", icon = "bar-chart" }) => {
          const themes = {
              orange: "from-orange-500 to-rose-500",
              emerald: "from-emerald-500 to-teal-600",
              blue: "from-blue-500 to-indigo-600",
              indigo: "from-indigo-600 to-violet-700",
              rose: "from-rose-500 to-pink-600"
          };
          const theme = themes[color] || themes.indigo;

          return (
              <div onClick={onClick} className={`relative p-6 rounded-[40px] overflow-hidden cursor-pointer group transition-all duration-500 hover:scale-[1.02] hover:shadow-premium bg-gradient-to-br ${theme} shadow-lg border border-white/10`}>

                  {/* Decorative animated icon backdrop */}
                  <div className="kpi-icon-bg absolute -right-4 -bottom-4 w-28 h-28 rounded-full bg-white/10 flex items-center justify-center pointer-events-none">
                      <div className="kpi-float text-white/30">
                          <Icon name={icon} size={64} />
                      </div>
                  </div>
                  <div className="kpi-pulse absolute -left-6 -top-6 w-24 h-24 rounded-full bg-white/15 pointer-events-none"></div>

                  <div className="flex justify-between items-start mb-6 relative z-10">
                      <div className="flex items-center gap-2">
                          <div className="w-7 h-7 rounded-lg bg-white/25 backdrop-blur-md flex items-center justify-center border border-white/20 shadow-sm">
                              <Icon name={icon} size={14} className="text-white" />
                          </div>
                          <span className="text-[10px] font-black text-white/90 uppercase tracking-[0.2em]">{label}</span>
                      </div>
                      {trend && (
                          <div className="bg-white/20 backdrop-blur-md px-2 py-1 rounded-lg border border-white/10 flex items-center gap-1">
                              <Icon name="trending-up" size={10} className={`text-white kpi-trend-arrow ${!isPos ? 'rotate-180' : ''}`} />
                              <span className="text-[9px] font-black text-white">{trend}</span>
                          </div>
                      )}
                  </div>

                  <div className="relative z-10 mb-2">
                      <h3 className="text-3xl font-black tracking-tighter text-white drop-shadow-sm">{val}</h3>
                  </div>

                  <div className="relative z-10 flex items-center justify-between">
                      {sub && <p className="text-[10px] font-bold text-white/70 uppercase tracking-widest">{sub}</p>}
                  </div>
              </div>
          );
      };

      const Row = ({ label, field, data, isPct, isBold, isNegative, highlight }) => (
          <tr className={`group transition-colors ${isBold ? 'bg-slate-50' : ''}`}>
              <td className={`px-6 py-3 text-[10px] sticky left-0 z-10 backdrop-blur-md border-r border-black/5 transition-colors ${isBold ? 'font-black text-slate-900 bg-slate-50' : 'font-medium text-slate-500 bg-white/90 group-hover:text-slate-900'}`}>
                  {label}
              </td>
              {SUB_BUS.map(bu => {
                  const val = data[bu.key][field];
                  return (
                      <td key={bu.key} className={`px-6 py-3 text-xs text-center tabular-nums transition-all ${bu.key === 'dom_fruits' ? 'bg-indigo-50 font-black text-indigo-600' : 'font-bold text-slate-600 group-hover:text-slate-950'} ${highlight ? 'text-base' : ''}`}>
                          <span className={isNegative ? 'text-rose-600' : ''}>
                              {isPct ? fmtPct(val) : fmtL(val)}
                          </span>
                      </td>
                  );
              })}
          </tr>
      );

      const SimpleTrendChart = ({ data, dataKey, color, isPct }) => {
          if (!data || !data.length) return null;

          // Single-month view: render a clean KPI/bar card instead of a lonely dot
          if (data.length === 1) {
              const d = data[0];
              const v = d[dataKey] || 0;
              const display = isPct ? fmtPct(v) : fmtL(v);
              return (
                  <div className="w-full h-full flex flex-col items-center justify-center gap-4 p-4">
                      <span className="text-[10px] font-black uppercase tracking-[0.3em]" style={{ color }}>
                          {d.label} · Single Period
                      </span>
                      <div className="text-5xl md:text-6xl font-black tracking-tighter text-slate-900">
                          {display}
                      </div>
                      <div className="w-full max-w-[260px] h-3 rounded-full bg-slate-100 overflow-hidden">
                          <div className="h-full rounded-full transition-all" style={{ width: '100%', background: `linear-gradient(90deg, ${color}, ${color}aa)` }} />
                      </div>
                      <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                          Switch range above to compare months
                      </p>
                  </div>
              );
          }

          const h = 200; const w = 400; const padding = 40;
          const vals = data.map(d => d[dataKey] || 0);
          const rawMax = Math.max(...vals, 0);
          const rawMin = Math.min(...vals, 0);
          const span = (rawMax - rawMin) || 1;
          const maxVal = rawMax + span * 0.2;
          const minVal = rawMin - span * 0.15;
          const range = maxVal - minVal || 1;
          const points = data.map((d, i) => {
              const x = padding + (i * (w - 2 * padding) / (data.length - 1));
              const y = h - padding - ((d[dataKey] - minVal) / range * (h - 2 * padding));
              return { x, y, val: d[dataKey], label: d.label };
          });

          const pathData = points.reduce((acc, p, i) => i === 0 ? `M ${p.x} ${p.y}` : `${acc} L ${p.x} ${p.y}`, "");
          const zeroY = h - padding - ((0 - minVal) / range * (h - 2 * padding));
          const baselineY = Math.min(Math.max(zeroY, padding), h - padding);

          return (
              <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-full overflow-visible">
                  <defs>
                      <linearGradient id={`grad-${dataKey}`} x1="0" y1="0" x2="0" y2="1">
                          <stop offset="0%" stopColor={color} stopOpacity="0.2" />
                          <stop offset="100%" stopColor={color} stopOpacity="0" />
                      </linearGradient>
                  </defs>
                  <path d={`${pathData} L ${points[points.length-1].x} ${baselineY} L ${points[0].x} ${baselineY} Z`} fill={`url(#grad-${dataKey})`} />
                  <path d={pathData} fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                  {minVal < 0 && (
                    <line x1={padding} y1={baselineY} x2={w-padding} y2={baselineY} stroke="rgba(0,0,0,0.18)" strokeWidth="1" strokeDasharray="3 3" />
                  )}
                  {points.map((p, i) => {
                      const isBelow = p.val < 0;
                      const rawLabelY = isBelow ? p.y + 16 : p.y - 10;
                      const labelY = Math.min(Math.max(rawLabelY, 14), h - padding - 4);
                      const valColor = isBelow ? '#e11d48' : '#0f172a';
                      return (
                      <g key={i} className="group">
                          <circle cx={p.x} cy={p.y} r="10" fill="transparent">
                              <title>{`${p.label}: ${isPct ? fmtPct(p.val) : p.val.toFixed(1)}`}</title>
                          </circle>
                          <circle cx={p.x} cy={p.y} r="4" fill="white" stroke={color} strokeWidth="2" />
                          <text x={p.x} y={labelY} textAnchor="middle" className="text-[10px] font-black" style={{ fill: valColor }}>{isPct ? fmtPct(p.val) : p.val.toFixed(0)}</text>
                          <text x={p.x} y={h - 10} textAnchor="middle" className="text-[9px] font-bold fill-slate-400">{p.label}</text>
                      </g>
                      );
                  })}
                  <line x1={padding} y1={h-padding} x2={w-padding} y2={h-padding} stroke="rgba(0,0,0,0.05)" strokeWidth="1" />
              </svg>
          );
      };

      const CompareBarChart = ({ data, leftLabel, rightLabel, isPct, unit }) => {
          if (!data || !data.length) return null;
          const w = 460, h = 240, padL = 50, padR = 16, padT = 24, padB = 50;
          const innerW = w - padL - padR;
          const innerH = h - padT - padB;
          const groups = data.length;
          const groupW = innerW / groups;
          const barW = Math.min(28, (groupW - 16) / 2);
          const allVals = data.flatMap(d => [d.left || 0, d.right || 0]);
          const maxV = Math.max(...allVals, 0.1) * 1.15;
          const minV = Math.min(...allVals, 0);
          const range = maxV - minV || 1;
          const yFor = v => padT + innerH - ((v - minV) / range) * innerH;
          const fmt = v => isPct ? `${v.toFixed(1)}%` : (unit === 'L' ? `₹${v.toFixed(1)}L` : v.toFixed(1));
          const ticks = 4;
          return (
              <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-full">
                  {Array.from({length: ticks+1}).map((_, i) => {
                      const v = minV + (range * i / ticks);
                      const y = yFor(v);
                      return (
                          <g key={i}>
                              <line x1={padL} y1={y} x2={w-padR} y2={y} stroke="#f1f5f9" strokeWidth="1" />
                              <text x={padL-6} y={y+3} textAnchor="end" className="fill-slate-400" style={{fontSize: 9, fontWeight: 700}}>{isPct ? `${v.toFixed(0)}%` : v.toFixed(0)}</text>
                          </g>
                      );
                  })}
                  {data.map((d, i) => {
                      const gx = padL + i * groupW + groupW/2;
                      const lx = gx - barW - 2;
                      const rx = gx + 2;
                      const ly = yFor(Math.max(d.left, 0));
                      const lh = Math.abs(yFor(d.left) - yFor(0));
                      const ry = yFor(Math.max(d.right, 0));
                      const rh = Math.abs(yFor(d.right) - yFor(0));
                      return (
                          <g key={i}>
                              <rect x={lx} y={d.left >= 0 ? ly : yFor(0)} width={barW} height={lh} rx="4" fill="#4f46e5" />
                              <text x={lx + barW/2} y={(d.left >= 0 ? ly : yFor(0)+lh) - 4} textAnchor="middle" className="fill-slate-900" style={{fontSize: 9, fontWeight: 900}}>{fmt(d.left)}</text>
                              <rect x={rx} y={d.right >= 0 ? ry : yFor(0)} width={barW} height={rh} rx="4" fill="#cbd5e1" />
                              <text x={rx + barW/2} y={(d.right >= 0 ? ry : yFor(0)+rh) - 4} textAnchor="middle" className="fill-slate-700" style={{fontSize: 9, fontWeight: 900}}>{fmt(d.right)}</text>
                              <text x={gx} y={h - padB + 16} textAnchor="middle" className="fill-slate-500" style={{fontSize: 10, fontWeight: 800}}>{d.label}</text>
                          </g>
                      );
                  })}
                  <line x1={padL} y1={yFor(0)} x2={w-padR} y2={yFor(0)} stroke="#e2e8f0" strokeWidth="1.5" />
                  <g transform={`translate(${padL}, ${h - 14})`}>
                      <rect x="0" y="-8" width="10" height="10" rx="2" fill="#4f46e5" />
                      <text x="14" y="1" className="fill-slate-700" style={{fontSize: 10, fontWeight: 800}}>{leftLabel}</text>
                      <rect x="100" y="-8" width="10" height="10" rx="2" fill="#cbd5e1" />
                      <text x="114" y="1" className="fill-slate-700" style={{fontSize: 10, fontWeight: 800}}>{rightLabel}</text>
                  </g>
              </svg>
          );
      };
      const Section = ({ label }) => (
          <tr className="bg-slate-50 border-y border-black/5">
              <td colSpan={SUB_BUS.length + 1} className="px-6 py-2 text-[8px] font-black text-indigo-600/80 uppercase tracking-[0.3em]">
                  {label}
              </td>
          </tr>
      );

      const ComparisonCard = ({ side, selectedBu, options, onSelect, data }) => {
          const stats = data[selectedBu] || { netCM3Pct: 0, gmv: 0 };
          const isPos = stats.netCM3Pct >= 0;

          return (
              <div className="flex-1 glass p-6 rounded-[32px] border border-black/5 bg-white shadow-sm flex flex-col gap-4 group hover:shadow-md transition-all relative">
                  <div className="flex items-center justify-between relative z-10">
                      <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">{side === 'left' ? 'Primary View' : 'Benchmark View'}</span>
                      <div className={`w-8 h-8 rounded-xl flex items-center justify-center ${isPos ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>
                          <Icon name="trending" size={16} className={!isPos ? 'rotate-180' : ''} />
                      </div>
                  </div>

                  <div className="relative z-10 bg-slate-50/50 border border-black/5 rounded-2xl p-3 shadow-inner">
                      <CustomSelect
                          value={selectedBu}
                          options={options}
                          onChange={onSelect}
                          data={data}
                          className="text-lg font-black text-slate-900"
                      />
                  </div>

                  <div className="flex items-center justify-between pt-2 relative z-10">
                      <div>
                          <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Net CM3 %</p>
                          <p className={`text-2xl font-black ${isPos ? 'text-emerald-600' : 'text-rose-600'}`}>{fmtPct(stats.netCM3Pct || 0)}</p>
                      </div>
                      <div className="text-right">
                          <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Revenue</p>
                          <p className="text-sm font-black text-slate-900">{fmtL(stats.gmv || 0)}</p>
                      </div>
                  </div>
              </div>
          );
      };

      const ComparisonSummaryModal = ({ isOpen, onClose, buLeftKey, buRightKey, data }) => {
          if (!isOpen || !buLeftKey || !buRightKey) return null;
          const buL = SUB_BUS.find(b => b.key === buLeftKey);
          const buR = SUB_BUS.find(b => b.key === buRightKey);
          const dL = data[buLeftKey];
          const dR = data[buRightKey];

          const revDelta = dL.gmv - dR.gmv;
          const cm3Delta = dL.netCM3Pct - dR.netCM3Pct;
          const hasBothData = (dL.gmv > 0) && (dR.gmv > 0);
          const winner = dL.netCM3Pct > dR.netCM3Pct ? buL : buR;
          const loser  = dL.netCM3Pct > dR.netCM3Pct ? buR : buL;
          const revLeader = dL.gmv > dR.gmv ? buL : buR;
          const logisticsDelta = (dL.storageLogistics || 0) - (dR.storageLogistics || 0);
          const growthIdx = dR.gmv > 0 ? ((dL.gmv / dR.gmv - 1) * 100) : null;

          const CompBar = ({ label, valL, valR, fmt }) => {
              const max = Math.max(Math.abs(valL), Math.abs(valR)) || 1;
              const pL = (Math.abs(valL) / max) * 100;
              const pR = (Math.abs(valR) / max) * 100;
              return (
                  <div className="space-y-3">
                      <div className="flex justify-between items-end">
                          <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{label}</span>
                          <div className="flex gap-4">
                              <span className="text-xs font-black text-indigo-600">{fmt(valL)}</span>
                              <span className="text-xs font-black text-slate-900">{fmt(valR)}</span>
                          </div>
                      </div>
                      <div className="h-3 w-full bg-slate-100 rounded-full overflow-hidden flex">
                          <div style={{ width: `${pL}%` }} className="h-full bg-indigo-600 rounded-r-full"></div>
                          <div className="w-px h-full bg-white z-10"></div>
                          <div style={{ width: `${pR}%` }} className="h-full bg-slate-300 rounded-l-full"></div>
                      </div>
                  </div>
              );
          };

          const CompRow = ({ label, field, isPct, isBold, isNegative }) => {
              const valL = dL[field];
              const valR = dR[field];
              const delta = valL - valR;
              const deltaPct = valR !== 0 ? (delta / Math.abs(valR)) * 100 : 0;
              const isBetter = isNegative ? (valL < valR) : (valL > valR);
              return (
                  <div className={`grid grid-cols-4 gap-4 py-3 border-b border-slate-50 items-center ${isBold ? 'bg-indigo-50/30 -mx-6 px-6' : ''}`}>
                      <div className={`text-[10px] ${isBold ? 'font-black text-slate-900' : 'font-medium text-slate-500'}`}>{label}</div>
                      <div className={`text-xs font-black text-center ${isBetter && !isBold ? 'text-indigo-600' : 'text-slate-900'}`}>{isPct ? fmtPct(valL) : fmtL(valL)}</div>
                      <div className={`text-xs font-black text-center ${!isBetter && !isBold ? 'text-indigo-600' : 'text-slate-900'}`}>{isPct ? fmtPct(valR) : fmtL(valR)}</div>
                      <div className={`text-[9px] font-black text-right ${delta >= 0 ? (isNegative ? 'text-rose-600' : 'text-emerald-600') : (isNegative ? 'text-emerald-600' : 'text-rose-600')}`}>
                          {delta >= 0 ? '+' : ''}{isPct ? delta.toFixed(1) + '%' : fmtL(delta)}
                      </div>
                  </div>
              );
          };

          return (
              <div className="fixed inset-0 z-[6000] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-xl" onClick={onClose}></div>
                  <div className="relative bg-white border border-black/5 w-full max-w-5xl rounded-[48px] shadow-premium overflow-hidden flex flex-col animate-zoom-in max-h-[95vh]">
                      <div className="p-10 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                          <div className="flex items-center gap-6">
                              <div className="w-16 h-16 bg-indigo-600 rounded-3xl flex items-center justify-center shadow-lg"><Icon name="target" size={32} className="text-white" /></div>
                              <div>
                                  <span className="text-[10px] font-black text-indigo-600 uppercase tracking-[0.2em] mb-1 block">Benchmarking Intelligence</span>
                                  <h2 className="text-3xl font-black text-slate-900 tracking-tighter">{buL.name} vs {buR.name}</h2>
                              </div>
                          </div>
                          <button onClick={onClose} className="p-4 hover:bg-slate-100 rounded-2xl transition-colors"><Icon name="x" size={24} className="text-slate-400" /></button>
                      </div>

                      <div className="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-6">
                          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                              <div className="space-y-5">
                                  <div className="flex items-center gap-3">
                                      <div className="w-8 h-8 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center"><Icon name="zap" size={16} /></div>
                                      <h3 className="text-xl font-black text-slate-900 tracking-tight">Comparative Analysis</h3>
