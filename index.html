          try {
              await fetch(url, {
                  method: "POST",
                  headers: { ...sbHeaders, "Prefer": "resolution=merge-duplicates,return=minimal" },
                  body: JSON.stringify({ year, month, bu_key, field, value })

      const SUB_BUS = [

      // Robust CSV Parser helper
      const parseCSV = (text) => {
          const lines = text.split(/\r?\n/);
          if (lines.length < 2) return [];
          const headers = lines[0].split(',').map(h => h.trim());
          return lines.slice(1).map(line => {
              const values = [];
              let current = '';
              let inQuotes = false;
              for (let i = 0; i < line.length; i++) {
                  const char = line[i];
                  if (char === '"') inQuotes = !inQuotes;
                  else if (char === ',' && !inQuotes) {
                      values.push(current.trim());
                      current = '';
                  } else current += char;
              }
              values.push(current.trim());
              return headers.reduce((obj, header, index) => {
                  let val = values[index] || "";
                  // Clean numeric strings like "408,168"
                  if (typeof val === 'string') val = val.replace(/^"|"$/g, '').replace(/,/g, '');
                  obj[header] = val;
                  obj._rawValues = values; // Store raw values for index-based access
                  return obj;
              }, {});
          });
      };

      const compute = (i) => {
          const gmv = parseFloat(i.gmv) || 0;
          const margin = parseFloat(i.margin) || 0;
          const dncn = parseFloat(i.dncn) || 0;
          // Gross Trade Margin is ALWAYS derived = Margin + DN & CN (never read raw, no override)
          const grossTradeMargin = margin + dncn;
          const grossTradeMarginPct = gmv ? (grossTradeMargin / gmv) * 100 : 0;
          const storageLogistics = parseFloat(i.storageLogistics) || 0;
          const workingCapital = parseFloat(i.workingCapital) || 0;
          const capitalCredit = parseFloat(i.capitalCredit) || 0;
          const marginOtherBU = parseFloat(i.marginOtherBU) || 0;
          const netTradeMargin = grossTradeMargin - storageLogistics - workingCapital - capitalCredit + marginOtherBU;
          const netTradeMarginPct = gmv ? (netTradeMargin / gmv) * 100 : 0;
          const cm2Costs = parseFloat(i.cm2Costs) || 0;
          const cm2 = netTradeMargin - cm2Costs;
          const manpower = parseFloat(i.manpower) || 0;
          const travel = parseFloat(i.travel) || 0;
          const other = parseFloat(i.other) || 0;
          const cm3Costs = manpower + travel + other;
          const cm3 = cm2 - cm3Costs;
          const cm3Pct = gmv ? (cm3 / gmv) * 100 : 0;
          const badDebts = parseFloat(i.badDebts) || 0;
          const provReversal = parseFloat(i.provReversal) || 0;
          const netCM3 = cm3 - badDebts + provReversal;
          const netCM3Pct = gmv ? (netCM3 / gmv) * 100 : 0;
          return {
              gmv, margin, dncn, grossTradeMargin, grossTradeMarginPct,
              storageLogistics, workingCapital, capitalCredit, marginOtherBU,
              netTradeMargin, netTradeMarginPct,

          const base = {};
          fields.forEach(f => {

          return isNeg ? `(${str})` : str;

      const fmtPct = (val) => {

          const safeName = safeFileName(filename);
          const ua = navigator.userAgent || "";
          const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
          const isAndroid = /Android/i.test(ua);
          const isMobile = isIOS || isAndroid || (/Mobi|Mobile/i.test(ua));

          // iOS Safari ignores the `download` attribute on blob URLs.
          // Use a FileReader -> data URL and navigate, which lets the user save/share the PDF.
          if (isIOS) {
              const reader = new FileReader();
              reader.onloadend = () => {
                  const dataUrl = reader.result;
                  // Try opening in a new tab first (must be sync after user gesture; we already are)
                  const win = window.open();
                  if (win) {
                      win.document.title = safeName;
                      win.document.body.style.margin = "0";
                      win.document.body.innerHTML =
                          `<iframe src="${dataUrl}" style="border:0;width:100vw;height:100vh" title="${safeName}"></iframe>`;
                  } else {
                      window.location.href = dataUrl;
                  }
              };
              reader.readAsDataURL(blob);
              return;
          }

          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = safeName;
          a.rel = "noopener";
          a.style.display = "none";
          document.body.appendChild(a);
          a.click();

          // Android Chrome sometimes needs a fallback if download didn't trigger
          if (isAndroid) {
              setTimeout(() => {
                  // If the page is still here and nothing happened, open in new tab
                  try { window.open(url, "_blank"); } catch (e) {}
              }, 600);
          }

              URL.revokeObjectURL(url);
          }, 4000);

          return (

                  <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={onClose}></div>
                  <div className="relative w-full max-w-lg bg-white h-full shadow-hover flex flex-col animate-slide-left">
                      <div className="p-6 border-b border-slate-100 flex items-center justify-between sticky top-0 bg-white z-10">
                          <div className="flex items-center gap-3"><h2 className="text-lg font-black text-slate-900">Inputs & Filters</h2></div>
                          <div className="flex items-center gap-4"><button className="text-xs font-bold text-slate-400 hover:text-slate-900">Reset</button><button onClick={onClose} className="p-2 hover:bg-slate-100 rounded-xl transition-colors"><Icon name="x" size={18} className="text-slate-400" /></button></div>
                      </div>
                      <div className="flex items-center gap-4 px-6 py-4 overflow-x-auto custom-scrollbar border-b border-slate-50">
                          {SUB_BUS.map(bu => (<button key={bu.key} onClick={() => onBuChange(bu.key)} className={`whitespace-nowrap px-4 py-2 rounded-xl text-[10px] font-black transition-all ${activeBu === bu.key ? 'bg-slate-900 text-white' : 'text-slate-400 hover:text-slate-900'}`}>{bu.name}</button>))}
                      </div>
                      <div className="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-8">
                          <div className="space-y-1">
                              <span className="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em]">Sub BU</span>
                              <h3 className="text-2xl font-black text-slate-900 flex items-center gap-2">
                                  {SUB_BUS.find(b => b.key === activeBu).name}
                                  {isAggregate && <span className="text-[10px] bg-indigo-50 text-indigo-500 px-2 py-0.5 rounded-full font-bold">CALCULATED TOTAL</span>}
                              </h3>
                              {isAggregate && <p className="text-[10px] text-slate-400 font-medium">This vertical is the aggregate of all sub-BUs. Edit individual BUs to change these values.</p>}
                          </div>
                          <div className="p-6 rounded-3xl border border-slate-100 space-y-6 relative"><div className="absolute -top-3 left-6 bg-white px-3 text-[10px] font-black text-slate-400 uppercase tracking-widest border border-slate-100 rounded-full">Gross Margin</div><div className="grid grid-cols-2 gap-6"><InputField label="GMV" field="gmv" val={buData.gmv} /><InputField label="Base Margin" field="margin" val={buData.margin} /><InputField label="DN & CN" field="dncn" val={buData.dncn} /><InputField label="Gross Trade Margin (= Margin + DN & CN)" field="grossTradeMargin" val={(parseFloat(buData.margin)||0) + (parseFloat(buData.dncn)||0)} readOnly /></div></div>
                          <div className="p-6 rounded-3xl border border-slate-100 space-y-6 relative"><div className="absolute -top-3 left-6 bg-white px-3 text-[10px] font-black text-slate-400 uppercase tracking-widest border border-slate-100 rounded-full">CM1 Adjustments</div><div className="grid grid-cols-2 gap-6"><InputField label="Other costs (Storage & Logistics)" field="storageLogistics" val={buData.storageLogistics} /><InputField label="Working Capital Cost" field="workingCapital" val={buData.workingCapital} /><InputField label="Capital Credit Cost (1%)" field="capitalCredit" val={buData.capitalCredit} /><InputField label="Margin from Other BUs (+)" field="marginOtherBU" val={buData.marginOtherBU} /></div></div>
                          <div className="p-6 rounded-3xl border border-slate-100 space-y-6 relative"><div className="absolute -top-3 left-6 bg-white px-3 text-[10px] font-black text-slate-400 uppercase tracking-widest border border-slate-100 rounded-full">CM2</div><InputField label="CM2 Costs" field="cm2Costs" val={buData.cm2Costs} /></div>
                          <div className="p-6 rounded-3xl border border-slate-100 space-y-6 relative"><div className="absolute -top-3 left-6 bg-white px-3 text-[10px] font-black text-slate-400 uppercase tracking-widest border border-slate-100 rounded-full">CM3</div><div className="grid grid-cols-2 gap-6"><InputField label="Manpower Cost" field="manpower" val={buData.manpower} /><InputField label="Travel Cost" field="travel" val={buData.travel} /><InputField label="Other Cost" field="other" val={buData.other} /></div></div>
                          <div className="p-6 rounded-3xl border border-slate-100 space-y-6 relative"><div className="absolute -top-3 left-6 bg-white px-3 text-[10px] font-black text-slate-400 uppercase tracking-widest border border-slate-100 rounded-full">Provisions</div><div className="grid grid-cols-2 gap-6"><InputField label="Bad Debts / Advances Provision" field="badDebts" val={buData.badDebts} /><InputField label="Provision Reversal (+)" field="provReversal" val={buData.provReversal} /></div></div>
                      </div>
                      <div className="p-6 border-t border-slate-100 flex gap-4"><button onClick={onClose} className="flex-1 py-3 bg-slate-900 text-white rounded-2xl text-xs font-black hover:bg-slate-800 transition-all shadow-premium">Apply & Close</button></div>
                  </div>
              </div>
          );
      };

      const MetricModal = ({ isOpen, onClose, metric, data, fmt, onSelectBu }) => {
          if (!isOpen || !metric) return null;

          const chartData = SUB_BUS.filter(b => b.key !== 'dom_fruits').map(bu => {
              const val = data[bu.key] ? (data[bu.key][metric.field] || 0) : 0;
              return {
                  key: bu.key,
                  name: bu.short,
                  value: val,
                  fullName: bu.name
              };
          }).sort((a,b) => Math.abs(b.value) - Math.abs(a.value));

          return (
              <div className="fixed inset-0 z-[3000] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={onClose}></div>
                  <div className="relative bg-white w-full max-w-4xl rounded-[40px] shadow-premium overflow-hidden animate-zoom-in max-h-[90vh] flex flex-col border border-black/5">
                      <div className="p-8 border-b border-slate-100 flex items-center justify-between flex-shrink-0 bg-slate-50/50">
                          <div>
                              <span className="text-[10px] font-black text-indigo-600 uppercase tracking-[0.2em] mb-1 block">Metric Analysis</span>
                              <h2 className="text-3xl font-black text-slate-900 tracking-tighter">{metric.label} Breakdown</h2>
                          </div>
                          <button onClick={onClose} className="p-3 hover:bg-slate-100 rounded-2xl transition-colors">
                              <Icon name="x" size={24} className="text-slate-400" />
                          </button>
                      </div>
                      <div className="flex-1 overflow-y-auto custom-scrollbar p-8">
                          <div className="bg-slate-50 rounded-[32px] p-8 mb-8 border border-slate-100">
                              <div className="flex items-end justify-between gap-2 h-[300px] px-4">
                                  {chartData.map((item, idx) => {
                                      const maxVal = Math.max(...chartData.map(d => Math.abs(d.value))) || 1;
                                      const height = (Math.abs(item.value) / maxVal) * 100;
                                      return (
                                          <div key={idx} onClick={() => onSelectBu(item.key)} className="flex-1 flex flex-col items-center group relative h-full justify-end cursor-pointer">
                                              <div className="absolute -top-12 opacity-0 group-hover:opacity-100 transition-all duration-300 pointer-events-none z-10">
                                                  <div className="bg-slate-900 text-white text-[10px] font-black px-3 py-1.5 rounded-lg shadow-xl whitespace-nowrap">
                                                      {item.fullName}: {fmt(item.value)}
                                                  </div>
                                                  <div className="w-2 h-2 bg-slate-900 rotate-45 mx-auto -mt-1"></div>
                                              </div>
                                              <div className="absolute -top-6 text-[10px] font-black text-slate-900">
                                                  {fmt(item.value)}
                                              </div>
                                              <div
                                                  style={{ height: `${height}%` }}
                                                  className={`w-full max-w-[40px] rounded-t-xl transition-all duration-500 ease-out hover:brightness-110 cursor-pointer ${item.value >= 0 ? 'bg-gradient-to-t from-indigo-600 to-indigo-400' : 'bg-gradient-to-t from-rose-600 to-rose-400'}`}
                                              ></div>
                                              <p className="mt-4 text-[9px] font-black text-slate-400 uppercase tracking-tighter text-center h-4 overflow-hidden w-full">{item.name}</p>
                                          </div>
                                      );
                                  })}
                              </div>
                          </div>

                          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                              {chartData.map(item => (
                                  <div key={item.name} onClick={() => onSelectBu(item.key)} className="p-5 rounded-3xl bg-white border border-slate-100 flex justify-between items-center group hover:border-indigo-200 transition-all shadow-sm cursor-pointer">
                                      <div>
                                          <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest group-hover:text-indigo-600 transition-colors">{item.fullName}</p>
                                          <p className="text-xl font-black text-slate-900">{fmt(item.value)}</p>
                                      </div>
                                      <div className={`w-1.5 h-12 rounded-full ${item.value >= 0 ? 'bg-indigo-500/20 group-hover:bg-indigo-600' : 'bg-rose-500/20 group-hover:bg-rose-600'} transition-colors`}></div>
                                  </div>
                              ))}
                          </div>
                      </div>
                      <div className="bg-slate-50 p-6 flex justify-center flex-shrink-0 border-t border-slate-100">
                          <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest italic">Click any Business Unit to see full regional P&L</p>
                      </div>
                  </div>
              </div>
          );
      };

      const BuDetailModal = ({ isOpen, onClose, buKey, data }) => {
          if (!isOpen || !buKey) return null;
          const bu = SUB_BUS.find(b => b.key === buKey);
          const d = data[buKey];

          const DetailRow = ({ label, val, isPct, isBold, isNegative }) => (
              <div className={`flex justify-between items-center py-4 border-b border-slate-100 ${isBold ? 'bg-indigo-50 -mx-8 px-8' : ''}`}>
                  <span className={`text-xs ${isBold ? 'font-black text-slate-900' : 'font-medium text-slate-500'}`}>{label}</span>
                  <span className={`text-sm font-black ${isNegative ? 'text-rose-600' : (isBold ? 'text-indigo-600' : 'text-slate-900')}`}>
                      {isPct ? fmtPct(val) : fmtL(val)}
                  </span>
              </div>
          );

          return (
              <div className="fixed inset-0 z-[4000] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={onClose}></div>
                  <div className="relative bg-white border border-black/5 w-full max-w-xl rounded-[40px] shadow-premium overflow-hidden flex flex-col animate-zoom-in max-h-[90vh]">
                      <div className="p-8 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                          <div>
                              <span className="text-[10px] font-black text-indigo-600 uppercase tracking-[0.2em] mb-1 block">Regional Drill-down</span>
                              <h2 className="text-3xl font-black text-slate-900 tracking-tighter">{bu.name} P&L</h2>
                          </div>
                          <button onClick={onClose} className="p-3 hover:bg-slate-100 rounded-2xl transition-colors"><Icon name="x" size={24} className="text-slate-400" /></button>
                      </div>
                      <div className="flex-1 overflow-y-auto custom-scrollbar p-8 space-y-1">
                          <DetailRow label="Total Sales (GMV)" val={d.gmv} isBold />
                          <DetailRow label="Gross Trade Margin" val={d.grossTradeMargin} />
                          <DetailRow label="Gross Trade Margin %" val={d.grossTradeMarginPct} isPct />
                          <DetailRow label="(-) Other costs (Storage & Logistics)" val={d.storageLogistics} isNegative />
                          <DetailRow label="(-) Working Capital Cost" val={d.workingCapital} isNegative />
                          <DetailRow label="(-) Capital/Credit Cost (1%)" val={d.capitalCredit} isNegative />
                          <DetailRow label="Net Trade Margin" val={d.netTradeMargin} isBold />
                          <DetailRow label="Net Trade Margin %" val={d.netTradeMarginPct} isPct />
                          <DetailRow label="(-) CM2 Costs" val={d.cm2Costs} isNegative />
                          <DetailRow label="CM2 Performance" val={d.cm2} isBold />
                          <DetailRow label="(-) Manpower & Travel" val={d.cm3Costs} isNegative />
                          <DetailRow label="CM3 Performance" val={d.cm3} isBold />
                          <DetailRow label="CM3 %" val={d.cm3Pct} isPct />
                          <DetailRow label="Net CM3 (After Provisions)" val={d.netCM3} isBold />
                          <DetailRow label="Final Net CM3 %" val={d.netCM3Pct} isPct />
                      </div>
                      <div className="p-6 bg-slate-50 border-t border-slate-100 flex gap-4">
                          <button onClick={onClose} className="flex-1 py-3 bg-slate-900 text-white rounded-2xl text-xs font-black hover:bg-slate-800 transition-all shadow-lg">Close Regional View</button>
                      </div>
                  </div>
              </div>
          );
      };

      const KPI = ({ label, val, trend, isPos, sub, onClick, color = "indigo", icon = "bar-chart" }) => {
          const themes = {
              orange: "from-orange-500 to-rose-500",
              emerald: "from-emerald-500 to-teal-600",
              blue: "from-blue-500 to-indigo-600",
              indigo: "from-indigo-600 to-violet-700",
              rose: "from-rose-500 to-pink-600"
          };
          const theme = themes[color] || themes.indigo;

          return (
              <div onClick={onClick} className={`relative p-6 rounded-[40px] overflow-hidden cursor-pointer group transition-all duration-500 hover:scale-[1.02] hover:shadow-premium bg-gradient-to-br ${theme} shadow-lg border border-white/10`}>

                  {/* Decorative animated icon backdrop */}
                  <div className="kpi-icon-bg absolute -right-4 -bottom-4 w-28 h-28 rounded-full bg-white/10 flex items-center justify-center pointer-events-none">
                      <div className="kpi-float text-white/30">
                          <Icon name={icon} size={64} />
                      </div>
                  </div>
                  <div className="kpi-pulse absolute -left-6 -top-6 w-24 h-24 rounded-full bg-white/15 pointer-events-none"></div>

                  <div className="flex justify-between items-start mb-6 relative z-10">
                      <div className="flex items-center gap-2">
                          <div className="w-7 h-7 rounded-lg bg-white/25 backdrop-blur-md flex items-center justify-center border border-white/20 shadow-sm">
                              <Icon name={icon} size={14} className="text-white" />
                          </div>
                          <span className="text-[10px] font-black text-white/90 uppercase tracking-[0.2em]">{label}</span>
                      </div>
                      {trend && (
                          <div className="bg-white/20 backdrop-blur-md px-2 py-1 rounded-lg border border-white/10 flex items-center gap-1">
                              <Icon name="trending-up" size={10} className={`text-white kpi-trend-arrow ${!isPos ? 'rotate-180' : ''}`} />
                              <span className="text-[9px] font-black text-white">{trend}</span>
                          </div>
                      )}
                  </div>

                  <div className="relative z-10 mb-2">
                      <h3 className="text-3xl font-black tracking-tighter text-white drop-shadow-sm">{val}</h3>
                  </div>

                  <div className="relative z-10 flex items-center justify-between">
                      {sub && <p className="text-[10px] font-bold text-white/70 uppercase tracking-widest">{sub}</p>}
                  </div>
              </div>
          );
      };

      const Row = ({ label, field, data, isPct, isBold, isNegative, highlight }) => (
          <tr className={`group transition-colors ${isBold ? 'bg-slate-50' : ''}`}>
              <td className={`px-6 py-3 text-[10px] sticky left-0 z-10 backdrop-blur-md border-r border-black/5 transition-colors ${isBold ? 'font-black text-slate-900 bg-slate-50' : 'font-medium text-slate-500 bg-white/90 group-hover:text-slate-900'}`}>
                  {label}
              </td>
              {SUB_BUS.map(bu => {
                  const val = data[bu.key][field];
                  return (
                      <td key={bu.key} className={`px-6 py-3 text-xs text-center tabular-nums transition-all ${bu.key === 'dom_fruits' ? 'bg-indigo-50 font-black text-indigo-600' : 'font-bold text-slate-600 group-hover:text-slate-950'} ${highlight ? 'text-base' : ''}`}>
                          <span className={isNegative ? 'text-rose-600' : ''}>
                              {isPct ? fmtPct(val) : fmtL(val)}
                          </span>
                      </td>
                  );
              })}
          </tr>
      );

      const SimpleTrendChart = ({ data, dataKey, color, isPct }) => {
          if (!data || !data.length) return null;

          // Single-month view: render a clean KPI/bar card instead of a lonely dot
          if (data.length === 1) {
              const d = data[0];
              const v = d[dataKey] || 0;
              const display = isPct ? fmtPct(v) : fmtL(v);
              return (
                  <div className="w-full h-full flex flex-col items-center justify-center gap-4 p-4">
                      <span className="text-[10px] font-black uppercase tracking-[0.3em]" style={{ color }}>
                          {d.label} · Single Period
                      </span>
                      <div className="text-5xl md:text-6xl font-black tracking-tighter text-slate-900">
                          {display}
                      </div>
                      <div className="w-full max-w-[260px] h-3 rounded-full bg-slate-100 overflow-hidden">
                          <div className="h-full rounded-full transition-all" style={{ width: '100%', background: `linear-gradient(90deg, ${color}, ${color}aa)` }} />
                      </div>
                      <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                          Switch range above to compare months
                      </p>
                  </div>
              );
          }

          const h = 200; const w = 400; const padding = 40;
          const vals = data.map(d => d[dataKey] || 0);
          const rawMax = Math.max(...vals, 0);
          const rawMin = Math.min(...vals, 0);
          const span = (rawMax - rawMin) || 1;
          const maxVal = rawMax + span * 0.2;
          const minVal = rawMin - span * 0.15;
          const range = maxVal - minVal || 1;
          const points = data.map((d, i) => {
              const x = padding + (i * (w - 2 * padding) / (data.length - 1));
              const y = h - padding - ((d[dataKey] - minVal) / range * (h - 2 * padding));
              return { x, y, val: d[dataKey], label: d.label };
          });

          const pathData = points.reduce((acc, p, i) => i === 0 ? `M ${p.x} ${p.y}` : `${acc} L ${p.x} ${p.y}`, "");
          const zeroY = h - padding - ((0 - minVal) / range * (h - 2 * padding));
          const baselineY = Math.min(Math.max(zeroY, padding), h - padding);

          return (
              <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-full overflow-visible">
                  <defs>
                      <linearGradient id={`grad-${dataKey}`} x1="0" y1="0" x2="0" y2="1">
                          <stop offset="0%" stopColor={color} stopOpacity="0.2" />
                          <stop offset="100%" stopColor={color} stopOpacity="0" />
                      </linearGradient>
                  </defs>
                  <path d={`${pathData} L ${points[points.length-1].x} ${baselineY} L ${points[0].x} ${baselineY} Z`} fill={`url(#grad-${dataKey})`} />
                  <path d={pathData} fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                  {minVal < 0 && (
                    <line x1={padding} y1={baselineY} x2={w-padding} y2={baselineY} stroke="rgba(0,0,0,0.18)" strokeWidth="1" strokeDasharray="3 3" />
                  )}
                  {points.map((p, i) => {
                      const isBelow = p.val < 0;
                      const rawLabelY = isBelow ? p.y + 16 : p.y - 10;
                      const labelY = Math.min(Math.max(rawLabelY, 14), h - padding - 4);
                      const valColor = isBelow ? '#e11d48' : '#0f172a';
                      return (
                      <g key={i} className="group">
                          <circle cx={p.x} cy={p.y} r="10" fill="transparent">
                              <title>{`${p.label}: ${isPct ? fmtPct(p.val) : p.val.toFixed(1)}`}</title>
                          </circle>
                          <circle cx={p.x} cy={p.y} r="4" fill="white" stroke={color} strokeWidth="2" />
                          <text x={p.x} y={labelY} textAnchor="middle" className="text-[10px] font-black" style={{ fill: valColor }}>{isPct ? fmtPct(p.val) : p.val.toFixed(0)}</text>
                          <text x={p.x} y={h - 10} textAnchor="middle" className="text-[9px] font-bold fill-slate-400">{p.label}</text>
                      </g>
                      );
                  })}
                  <line x1={padding} y1={h-padding} x2={w-padding} y2={h-padding} stroke="rgba(0,0,0,0.05)" strokeWidth="1" />
              </svg>
          );
      };

      const CompareBarChart = ({ data, leftLabel, rightLabel, isPct, unit }) => {
          if (!data || !data.length) return null;
          const w = 460, h = 240, padL = 50, padR = 16, padT = 24, padB = 50;
          const innerW = w - padL - padR;
          const innerH = h - padT - padB;
          const groups = data.length;
          const groupW = innerW / groups;
          const barW = Math.min(28, (groupW - 16) / 2);
          const allVals = data.flatMap(d => [d.left || 0, d.right || 0]);
          const maxV = Math.max(...allVals, 0.1) * 1.15;
          const minV = Math.min(...allVals, 0);
          const range = maxV - minV || 1;
          const yFor = v => padT + innerH - ((v - minV) / range) * innerH;
          const fmt = v => isPct ? `${v.toFixed(1)}%` : (unit === 'L' ? `₹${v.toFixed(1)}L` : v.toFixed(1));
          const ticks = 4;
          return (
              <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-full">
                  {Array.from({length: ticks+1}).map((_, i) => {
                      const v = minV + (range * i / ticks);
                      const y = yFor(v);
                      return (
                          <g key={i}>
                              <line x1={padL} y1={y} x2={w-padR} y2={y} stroke="#f1f5f9" strokeWidth="1" />
                              <text x={padL-6} y={y+3} textAnchor="end" className="fill-slate-400" style={{fontSize: 9, fontWeight: 700}}>{isPct ? `${v.toFixed(0)}%` : v.toFixed(0)}</text>
                          </g>
                      );
                  })}
                  {data.map((d, i) => {
                      const gx = padL + i * groupW + groupW/2;
                      const lx = gx - barW - 2;
                      const rx = gx + 2;
                      const ly = yFor(Math.max(d.left, 0));
                      const lh = Math.abs(yFor(d.left) - yFor(0));
                      const ry = yFor(Math.max(d.right, 0));
                      const rh = Math.abs(yFor(d.right) - yFor(0));
                      return (
                          <g key={i}>
                              <rect x={lx} y={d.left >= 0 ? ly : yFor(0)} width={barW} height={lh} rx="4" fill="#4f46e5" />
                              <text x={lx + barW/2} y={(d.left >= 0 ? ly : yFor(0)+lh) - 4} textAnchor="middle" className="fill-slate-900" style={{fontSize: 9, fontWeight: 900}}>{fmt(d.left)}</text>
                              <rect x={rx} y={d.right >= 0 ? ry : yFor(0)} width={barW} height={rh} rx="4" fill="#cbd5e1" />
                              <text x={rx + barW/2} y={(d.right >= 0 ? ry : yFor(0)+rh) - 4} textAnchor="middle" className="fill-slate-700" style={{fontSize: 9, fontWeight: 900}}>{fmt(d.right)}</text>
                              <text x={gx} y={h - padB + 16} textAnchor="middle" className="fill-slate-500" style={{fontSize: 10, fontWeight: 800}}>{d.label}</text>
                          </g>
                      );
                  })}
                  <line x1={padL} y1={yFor(0)} x2={w-padR} y2={yFor(0)} stroke="#e2e8f0" strokeWidth="1.5" />
                  <g transform={`translate(${padL}, ${h - 14})`}>
                      <rect x="0" y="-8" width="10" height="10" rx="2" fill="#4f46e5" />
                      <text x="14" y="1" className="fill-slate-700" style={{fontSize: 10, fontWeight: 800}}>{leftLabel}</text>
                      <rect x="100" y="-8" width="10" height="10" rx="2" fill="#cbd5e1" />

      const AccountsCenter = ({ isOpen, onClose }) => {

                              {[

                                  { icon: "pie", label: "Interface Layout", sub: "UI density & color preferences" }

                                  <div key={i} className="flex items-center gap-5 p-5 hover:bg-slate-50 rounded-3xl cursor-pointer transition-all group border border-transparent hover:border-black/5">
                                      <div className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm group-hover:scale-110 transition-transform"><Icon name={item.icon} size={20} className="text-indigo-600" /></div>
                                      <div className="flex-1">

                      </div>

          );
      };

      // EditableRow was removed in favor of Drawer input

      const Dashboard = () => {
          const [view, setView] = useState("actual");
          const [month, setMonth] = useState("Apr");
          const [year, setYear] = useState("2026");
          const [rawSheetData, setRawSheetData] = useState([]);
          const [loading, setLoading] = useState(true);
          const [showDrawer, setShowDrawer] = useState(false);
          const [inputs, setInputs] = useState({});
          const [activeDrawerBu, setActiveDrawerBu] = useState(SUB_BUS[0].key);
          const [selectedMetric, setSelectedMetric] = useState(null);
          const [selectedBuDetail, setSelectedBuDetail] = useState(null);
          const [showSummary, setShowSummary] = useState(false);
          const [chart1Metric, setChart1Metric] = useState("Gross Margin %");
          const [chart2Metric, setChart2Metric] = useState("CM3");
          const [chartRange, setChartRange] = useState("6M"); // 1M (selected only), 3M, 6M, 12M, CUSTOM
          const [customRange, setCustomRange] = useState({ startMonth: "Nov", startYear: "2025", endMonth: "Apr", endYear: "2026" });
          const [showRangePicker, setShowRangePicker] = useState(false);
          const [allOverrides, setAllOverrides] = useState({}); // { month: { bu_key: { field: value } } }

          const METRIC_CHART_MAP = {
              "GMV": { key: "gmv", isPct: false, color: "#f97316", desc: "Total gross merchandise value (Lakhs)" },
              "Gross Margin %": { key: "marginPct", isPct: true, color: "#4f46e5", desc: "Network blended profitability timeline" },
              "Gross Margin": { key: "margin", isPct: false, color: "#6366f1", desc: "Total trade margin (Lakhs)" },
              "CM1": { key: "cm1", isPct: false, color: "#0ea5e9", desc: "Post-logistics margin (Lakhs)" },
              "CM2": { key: "cm2", isPct: false, color: "#3b82f6", desc: "Post operations margin (Lakhs)" },
              "CM3": { key: "cm3", isPct: false, color: "#059669", desc: "Monthly contribution margin tier 3 (Lakhs)" },
              "Net CM3": { key: "netCm3", isPct: false, color: "#e11d48", desc: "Final bottomline after provisions (Lakhs)" }
          };
          const [showComparisonSummary, setShowComparisonSummary] = useState(false);
          const [showAccounts, setShowAccounts] = useState(false);
          const [regionFilter, setRegionFilter] = useState('dom_fruits');
          const [compareLeft, setCompareLeft] = useState('pomo_ka');
          const [compareRight, setCompareRight] = useState('shimla_apple_fresh');

          useEffect(() => {
              const load = async () => {
                  let text = EMBEDDED_SHEET_CSV;
                  try {
                      const res = await fetch(SHEET_URL);
                      if (res.ok) text = await res.text();
                  } catch (e) {
                      console.error("Failed to load live sheet, using embedded data", e);
                  }
                  const data = parseCSV(text);
                  setRawSheetData(data.length ? data : parseCSV(EMBEDDED_SHEET_CSV));
                  setLoading(false);
              };
              load();
          }, []);

          const mapRowToBU = (row) => {
              const mark = (row['Mark'] || "").toUpperCase();
              const channel = (row['Channel'] || "").toLowerCase();
              const market = (row['Source Market'] || "").toLowerCase();

              // Surgical Column F (Index 5) check for Mode
              const rawMode = (row._rawValues && row._rawValues[5] ? String(row._rawValues[5]) : "").toUpperCase();
              const isKnownParty =
                  rawMode.includes("KP") ||
                  rawMode.includes("KNOWN PARTY") ||
                  rawMode.includes("KNOWN PAIR") ||
                  rawMode.includes("KNOWN PARE");

              if (isKnownParty) return "others";

              if (mark.includes("POMO")) {
                  if (channel === "ninjacart") {
                      if (market.includes("karnataka")) return "pomo_ka";
                      if (market.includes("maha")) return "pomo_mh";
                      if (market.includes("rajasthan") || market.includes("gujarat")) return "pomo_rj_gj";
                  }
              }
              if (channel.includes("cc")) {
                  if (market.includes("karnataka")) return "ka_cc";
                  if (market.includes("maha")) return "mh_cc";
              }
              if (mark.includes("MANGO")) return "mango";
              if (mark.includes("SHIMLA") || mark.includes("APPLE")) {
                  return mark.includes("CA") ? "shimla_apple_fresh" : "shimla_apple_ca";
              }
              if (mark.includes("DOM") || mark.includes("FRUIT")) return "dom_fruits";
              return "others";
          };

          const baseAggregated = useMemo(() => {
              const yearFull = year;
              const monthMap = {
                  "Jan": "Jan", "Feb": "Feb", "Mar": "March", "Apr": "April", "May": "May", "Jun": "June",
                  "Jul": "July", "Aug": "August", "Sep": "September", "Oct": "October", "Nov": "November", "Dec": "December"
              };
              const targetMonth = (monthMap[month] || month).toLowerCase();

              const buckets = {};
              SUB_BUS.forEach(b => buckets[b.key] = { gmv: 0, margin: 0, boxes: 0 });

              rawSheetData.forEach(row => {
                  const rowYear = String(row['Year'] || "").trim();
                  const rowMonth = (row['Closure'] || "").trim().toLowerCase();

                  if (rowYear === yearFull && (rowMonth === targetMonth || rowMonth.includes(targetMonth))) {
                      const key = mapRowToBU(row);
                      if (key && key !== "dom_fruits" && buckets[key]) {
                          const salesReceivable = parseFloat(row['Sales Receivable']) || 0;
                          buckets[key].gmv += parseFloat(row['Sales (GMV)']) || 0;
                          // Margin should only include fully received/closed rows; open receivable rows
                          // were making Mango show 1.0L instead of 0.8L.
                          if (salesReceivable <= 0) buckets[key].margin += parseFloat(row['Margin']) || 0;
                          buckets[key].boxes += parseFloat(row['No. of Boxes']) || 0;
                      }
                  }
              });

              // Convert to Lakhs but KEEP full precision for math.
              // Display formatters (fmtL / fmtPct) handle rounding at render time,
              // so derived values like Gross Trade Margin % stay accurate.
              Object.keys(buckets).forEach(k => {
                  buckets[k].gmv = buckets[k].gmv / 100000;
                  buckets[k].margin = buckets[k].margin / 100000;
              });

              return buckets;
          }, [rawSheetData, month, year]);

          // Load persisted manual overrides for the active year/month from Lovable Cloud
          useEffect(() => {
              let cancelled = false;
              (async () => {
                  const rows = await fetchOverrides(year, month);
                  if (cancelled) return;
                  const grouped = {};
                  rows.forEach(r => {
                      grouped[r.bu_key] = grouped[r.bu_key] || {};
                      grouped[r.bu_key][r.field] = Number(r.value);
                  });
                  setInputs(grouped);
              })();
              return () => { cancelled = true; };
          }, [year, month]);

          // Load ALL overrides for the year (used to power multi-month trend charts with real DB values)
          useEffect(() => {
              let cancelled = false;
              (async () => {
                  const rows = await fetchAllOverridesForYear(year);
                  if (cancelled) return;
                  const grouped = {};
                  rows.forEach(r => {
                      grouped[r.month] = grouped[r.month] || {};
                      grouped[r.month][r.bu_key] = grouped[r.month][r.bu_key] || {};
                      grouped[r.month][r.bu_key][r.field] = Number(r.value);
                  });
                  setAllOverrides(grouped);
              })();
              return () => { cancelled = true; };
          }, [year, month]);

          const updateInput = (buKey, field, val) => {
              setInputs(prev => ({
                  ...prev,
                  [buKey]: {
                      ...(prev[buKey] || {}),
                      [field]: val
                  }
              }));
              // Persist to Lovable Cloud (fire-and-forget)
              saveOverride(year, month, buKey, field, val);
          };

          const activeData = useMemo(() => {
              const merged = {};

              // First process individual BUs
              SUB_BUS.filter(b => b.key !== 'dom_fruits').forEach(b => {
                  const base = baseAggregated[b.key] || { gmv: 0, margin: 0, boxes: 0 };
                  const overrides = inputs[b.key] || {};
                  const buData = { ...base, ...overrides };

                  buData.dncn = buData.dncn || 0;
                  // Gross Trade Margin is ALWAYS derived = Margin + DN & CN (no manual override)
                  buData.grossTradeMargin = (parseFloat(buData.margin) || 0) + (parseFloat(buData.dncn) || 0);

                  buData.storageLogistics = buData.storageLogistics || 0;
                  buData.workingCapital = buData.workingCapital || 0;
                  buData.capitalCredit = buData.capitalCredit || 0;
                  buData.marginOtherBU = buData.marginOtherBU || 0;
                  buData.cm2Costs = buData.cm2Costs || 0;
                  buData.manpower = buData.manpower || 0;
                  buData.travel = buData.travel || 0;
                  buData.other = buData.other || 0;
                  buData.badDebts = buData.badDebts || 0;
                  buData.provReversal = buData.provReversal || 0;

                  merged[b.key] = buData;
              });

              // Calculate domestic fruits aggregate
              const domFruits = { gmv: 0, margin: 0, dncn: 0, grossTradeMargin: 0, boxes: 0, storageLogistics: 0, workingCapital: 0, capitalCredit: 0, marginOtherBU: 0, cm2Costs: 0, manpower: 0, travel: 0, other: 0, badDebts: 0, provReversal: 0 };
              SUB_BUS.filter(b => b.key !== 'dom_fruits').forEach(b => {
                  const buData = merged[b.key];
                  Object.keys(domFruits).forEach(k => { domFruits[k] += buData[k] || 0; });
              });
              // Apply aggregate-level manual overrides (so editing the "Domestic Fruits" tab works)
              const aggOverrides = inputs['dom_fruits'] || {};
              Object.keys(aggOverrides).forEach(k => { domFruits[k] = aggOverrides[k]; });
              merged['dom_fruits'] = domFruits;

              return merged;
          }, [baseAggregated, inputs]);

          const computed = useMemo(() => {
              const out = {};
              const subBuKeys = SUB_BUS.filter(b => b.key !== "dom_fruits").map(b => b.key);

              // Totals from aggregate (Domestic Fruits) — these are GMV-distributed across BUs
              const totalGmv = subBuKeys.reduce((sum, k) => sum + (activeData[k].gmv || 0), 0);
              const totalCm2Costs = activeData["dom_fruits"].cm2Costs || 0;
              const totalWorkingCapital = activeData["dom_fruits"].workingCapital || 0;
              const totalCapitalCredit = activeData["dom_fruits"].capitalCredit || 0;

              const distribute = (total, buGmv) => totalGmv > 0 ? total * (buGmv / totalGmv) : 0;

              // 1. Process sub-BUs. Distribute aggregate (Domestic Fruits) costs by GMV ONLY when
              //    the sub-BU has no manual override for that field.
              subBuKeys.forEach(k => {
                  const buInput = { ...activeData[k] };
                  const overrides = inputs[k] || {};
                  if (overrides.cm2Costs === undefined)       buInput.cm2Costs = distribute(totalCm2Costs, buInput.gmv);
                  if (overrides.workingCapital === undefined) buInput.workingCapital = distribute(totalWorkingCapital, buInput.gmv);
                  if (overrides.capitalCredit === undefined)  buInput.capitalCredit = distribute(totalCapitalCredit, buInput.gmv);
                  out[k] = compute(buInput);
              });


              // 2. Process Domestic Fruits (Aggregate)
              const fields = ['gmv', 'margin', 'dncn', 'grossTradeMargin', 'storageLogistics', 'workingCapital', 'capitalCredit', 'marginOtherBU', 'cm2Costs', 'manpower', 'travel', 'other', 'badDebts', 'provReversal'];
              const distributedFields = new Set(['cm2Costs', 'workingCapital', 'capitalCredit']);
              const aggOverrides = inputs['dom_fruits'] || {};
              const aggregateInput = {};
              fields.forEach(f => {
                  if (distributedFields.has(f) || aggOverrides[f] !== undefined) {
                      // Use the master input directly (manual override or distributed master)
                      aggregateInput[f] = activeData["dom_fruits"][f] || 0;
                  } else {
                      aggregateInput[f] = subBuKeys.reduce((sum, k) => sum + (activeData[k][f] || 0), 0);
                  }
              });
              out["dom_fruits"] = compute(aggregateInput);

              return out;
          }, [activeData, inputs]);

          const trendData = useMemo(() => {
              if (!rawSheetData.length) return [];
              const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
              const monthMap = { "Jan": "Jan", "Feb": "Feb", "Mar": "March", "Apr": "April", "May": "May", "Jun": "June", "Jul": "July", "Aug": "August", "Sep": "September", "Oct": "October", "Nov": "November", "Dec": "December" };
              const subBuKeys = SUB_BUS.filter(b => b.key !== "dom_fruits").map(b => b.key);
              const fields = ['gmv', 'margin', 'dncn', 'grossTradeMargin', 'storageLogistics', 'workingCapital', 'capitalCredit', 'marginOtherBU', 'cm2Costs', 'manpower', 'travel', 'other', 'badDebts', 'provReversal'];
              const currentIdx = months.indexOf(month);
              const rangeMap = { "1M": 1, "3M": 3, "6M": 6, "12M": 12 };
              // Build list of {mIdx, y} entries to iterate
              const entries = [];
              if (chartRange === "CUSTOM") {
                  const sIdx = months.indexOf(customRange.startMonth);
                  const eIdx = months.indexOf(customRange.endMonth);
                  const sY = parseInt(customRange.startYear);
                  const eY = parseInt(customRange.endYear);
                  let cy = sY, ci = sIdx;
                  // Safety cap to avoid infinite loops
                  for (let guard = 0; guard < 60; guard++) {
                      entries.push({ mIdx: ci, y: cy });
                      if (ci === eIdx && cy === eY) break;
                      ci++;
                      if (ci > 11) { ci = 0; cy++; }
                      if (cy > eY + 1) break;
                  }
              } else {
                  const span = rangeMap[chartRange] || 1;
                  for (let i = span - 1; i >= 0; i--) {
                      let mIdx = currentIdx - i;
                      let y = parseInt(year);
                      if (mIdx < 0) { mIdx += 12; y -= 1; }
                      entries.push({ mIdx, y });
                  }
              }
              const results = [];

              for (const { mIdx, y } of entries) {
                  const mName = months[mIdx];
                  const mFull = (monthMap[mName] || mName).toLowerCase();

                  // 1) Aggregate raw sheet GMV/margin per sub-BU for this month
                  const buckets = {};
                  subBuKeys.forEach(k => buckets[k] = { gmv: 0, margin: 0 });
                  rawSheetData.forEach(row => {
                      const rY = String(row['Year'] || "").trim();
                      const rM = (row['Closure'] || "").trim().toLowerCase();
                      if (rY === String(y) && (rM === mFull || rM.includes(mFull))) {
                          const key = mapRowToBU(row);
                          if (key && key !== "dom_fruits" && buckets[key]) {
                              const salesReceivable = parseFloat(row['Sales Receivable']) || 0;
                              buckets[key].gmv += (parseFloat(row['Sales (GMV)']) || 0) / 100000;
                              if (salesReceivable <= 0) buckets[key].margin += (parseFloat(row['Margin']) || 0) / 100000;
                          }
                      }
                  });

                  // 2) Merge per-sub-BU DB overrides into the buckets
                  const monthOverrides = (allOverrides[mName] || {});
                  const mergedSub = {};
                  subBuKeys.forEach(k => {
                      mergedSub[k] = { ...buckets[k], ...(monthOverrides[k] || {}) };
                  });

                  // 3) Build dom_fruits aggregate exactly like the main dashboard does:
                  //    sum of sub-BU fields, then overlay any dom_fruits-level override (dncn, costs, etc.)
                  const aggOverrides = monthOverrides['dom_fruits'] || {};
                  const aggregateInput = {};
                  fields.forEach(f => {
                      const summed = subBuKeys.reduce((sum, k) => sum + (Number(mergedSub[k][f]) || 0), 0);
                      aggregateInput[f] = aggOverrides[f] !== undefined ? Number(aggOverrides[f]) : summed;
                  });
                  const total = compute(aggregateInput);

                  results.push({
                      label: `${mName}`,
                      gmv: total.gmv,
                      margin: total.grossTradeMargin,
                      marginPct: total.grossTradeMarginPct,
                      cm1: total.netTradeMargin,
                      cm2: total.cm2,
                      cm3: total.cm3,
                      netCm3: total.netCM3
                  });
              }
              return results;

                                      <tbody className="divide-y divide-black/5 text-slate-600">
                                          <Row label="Sales (GMV)" field="gmv" data={computed} isBold />
                                          <Row label="Margin" field="margin" data={computed} isBold />
                                          <Row label="DN & CN" field="dncn" data={computed} />
                                          <Row label="Gross Trade Margin" field="grossTradeMargin" data={computed} isBold />
                                          <Row label="Gross Trade Margin %" field="grossTradeMarginPct" data={computed} isPct />
                                          <Section label="Contribution Margin 1 Adjustments" />
                                          <Row label="Other costs (Storage & Logistics)" field="storageLogistics" data={computed} isNegative />
                                          <Row label="Working Capital Cost" field="workingCapital" data={computed} isNegative />
                                          <Row label="Capital Credit Cost (1%)" field="capitalCredit" data={computed} isNegative />
                                          <Row label="Margin from Other BUs (+)" field="marginOtherBU" data={computed} />
                                          <Row label="Net Trade Margin" field="netTradeMargin" data={computed} isBold />
                                          <Row label="Net Trade Margin %" field="netTradeMarginPct" data={computed} isPct />
                                          <Section label="Contribution Margin 2" />
                                          <Row label="CM2 Costs" field="cm2Costs" data={computed} isNegative />
                                          <Row label="CM2 Performance" field="cm2" data={computed} isBold />
                                          <Section label="Contribution Margin 3" />
                                          <Row label="CM3 Costs" field="cm3Costs" data={computed} isBold isNegative />
                                          <Row label="Manpower Cost" field="manpower" data={computed} isNegative />
                                          <Row label="Travel Cost" field="travel" data={computed} isNegative />
                                          <Row label="Other Cost" field="other" data={computed} isNegative />
                                          <Row label="CM3 Performance" field="cm3" data={computed} isBold />
                                          <Row label="CM3 %" field="cm3Pct" data={computed} isPct />
                                          <Section label="Final Bottomline" />
                                          <Row label="Bad Debts / Advances Provision" field="badDebts" data={computed} isNegative />
                                          <Row label="Provision Reversal (+)" field="provReversal" data={computed} />
                                          <Row label="Net CM3 (Post-Prov)" field="netCM3" data={computed} isBold highlight />
                                          <Row label="Final Net CM3 %" field="netCM3Pct" data={computed} isPct highlight />
                                      </tbody>
                                  </table>
                              </div>
                          </div>
                          <div className="flex items-center justify-between mb-2 relative">
                              <div>
                                  <h2 className="text-xl font-black text-slate-900 tracking-tighter">Trend Charts</h2>
                                  <p className="text-[10px] text-slate-400 font-medium mt-0.5">
                                      {chartRange === "1M"
                                          ? `Showing only ${month} ${year}`
                                          : chartRange === "CUSTOM"
                                              ? `Showing ${customRange.startMonth} ${customRange.startYear} → ${customRange.endMonth} ${customRange.endYear}`
                                              : `Showing last ${chartRange} ending ${month} ${year}`}
                                  </p>
                              </div>
                              <div className="flex items-center gap-1 bg-slate-100 p-1 rounded-xl relative">
                                  {["RANGE", "1M", "3M", "6M", "12M"].map(r => {
                                      const isCustom = r === "RANGE";
                                      const active = isCustom ? chartRange === "CUSTOM" : chartRange === r;
                                      return (
                                          <button
                                              key={r}
                                              onClick={() => {
                                                  if (isCustom) {
                                                      setShowRangePicker(v => !v);
                                                      if (chartRange !== "CUSTOM") setChartRange("CUSTOM");
                                                  } else {
                                                      setShowRangePicker(false);
                                                      setChartRange(r);
                                                  }
                                              }}
                                              className={`px-3 py-1.5 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all ${
                                                  active ? "bg-white text-indigo-600 shadow-sm" : "text-slate-500 hover:text-slate-700"
                                              }`}
                                          >
                                              {isCustom ? (chartRange === "CUSTOM" ? "Range ▾" : "Select Range") : (r === "1M" ? "Selected" : r)}
                                          </button>
                                      );
                                  })}
                                  {showRangePicker && (
                                      <div className="absolute right-0 top-full mt-2 z-50 bg-white border border-black/5 shadow-premium rounded-2xl p-4 w-[320px]">
                                          <p className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-3">Custom Month Range</p>
                                          <div className="grid grid-cols-2 gap-3">
                                              <div>
                                                  <label className="text-[9px] font-bold uppercase tracking-wider text-slate-400">From</label>
                                                  <div className="flex gap-1 mt-1">
                                                      <select value={customRange.startMonth} onChange={e => setCustomRange(c => ({...c, startMonth: e.target.value}))} className="flex-1 text-xs font-bold rounded-lg border border-slate-200 px-2 py-1.5 bg-slate-50">
                                                          {["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"].map(m => <option key={m} value={m}>{m}</option>)}
                                                      </select>
                                                      <select value={customRange.startYear} onChange={e => setCustomRange(c => ({...c, startYear: e.target.value}))} className="w-20 text-xs font-bold rounded-lg border border-slate-200 px-2 py-1.5 bg-slate-50">
                                                          {["2024","2025","2026","2027"].map(y => <option key={y} value={y}>{y}</option>)}
                                                      </select>
                                                  </div>
                                              </div>
                                              <div>
                                                  <label className="text-[9px] font-bold uppercase tracking-wider text-slate-400">To</label>
                                                  <div className="flex gap-1 mt-1">
                                                      <select value={customRange.endMonth} onChange={e => setCustomRange(c => ({...c, endMonth: e.target.value}))} className="flex-1 text-xs font-bold rounded-lg border border-slate-200 px-2 py-1.5 bg-slate-50">
                                                          {["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"].map(m => <option key={m} value={m}>{m}</option>)}
                                                      </select>
                                                      <select value={customRange.endYear} onChange={e => setCustomRange(c => ({...c, endYear: e.target.value}))} className="w-20 text-xs font-bold rounded-lg border border-slate-200 px-2 py-1.5 bg-slate-50">
                                                          {["2024","2025","2026","2027"].map(y => <option key={y} value={y}>{y}</option>)}
                                                      </select>
                                                  </div>
                                              </div>
                                          </div>
                                          <div className="flex justify-end gap-2 mt-4">
                                              <button onClick={() => setShowRangePicker(false)} className="px-3 py-1.5 text-[10px] font-black uppercase tracking-widest rounded-lg text-slate-500 hover:bg-slate-100">Close</button>
                                              <button onClick={() => { setChartRange("CUSTOM"); setShowRangePicker(false); }} className="px-3 py-1.5 text-[10px] font-black uppercase tracking-widest rounded-lg bg-indigo-600 text-white shadow-sm hover:bg-indigo-700">Apply</button>
                                          </div>
                                      </div>
                                  )}
                              </div>
                          </div>
                          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                              <div className="glass p-8 rounded-[32px] border border-black/5 shadow-premium bg-white">
                                  <div className="mb-8 flex justify-between items-start">
                                      <div>
                                          <h3 className="text-lg font-black text-slate-900 tracking-tighter">{chart1Metric} Trend</h3>
                                          <p className="text-[10px] text-slate-400 font-medium mt-1">{METRIC_CHART_MAP[chart1Metric].desc}</p>
                                      </div>
                                      <CustomSelect
                                          value={chart1Metric}
                                          options={Object.keys(METRIC_CHART_MAP)}
                                          onChange={setChart1Metric}
                                          className="bg-slate-50 border border-black/5 text-slate-700 text-xs font-black rounded-xl px-4 py-2 shadow-sm min-w-[140px]"
                                      />
                                  </div>
                                  <div className="h-[250px] w-full mt-4">
                                      <SimpleTrendChart data={trendData} dataKey={METRIC_CHART_MAP[chart1Metric].key} color={METRIC_CHART_MAP[chart1Metric].color} isPct={METRIC_CHART_MAP[chart1Metric].isPct} />
                                  </div>
                              </div>
                              <div className="glass p-8 rounded-[32px] border border-black/5 shadow-premium bg-white">
                                  <div className="mb-8 flex justify-between items-start">
                                      <div>
                                          <h3 className="text-lg font-black text-slate-900 tracking-tighter">{chart2Metric} Trend</h3>
                                          <p className="text-[10px] text-slate-400 font-medium mt-1">{METRIC_CHART_MAP[chart2Metric].desc}</p>
                                      </div>
                                      <CustomSelect
                                          value={chart2Metric}
                                          options={Object.keys(METRIC_CHART_MAP)}
                                          onChange={setChart2Metric}
                                          className="bg-slate-50 border border-black/5 text-slate-700 text-xs font-black rounded-xl px-4 py-2 shadow-sm min-w-[140px]"
                                      />
                                  </div>
                                  <div className="h-[250px] w-full mt-4">
                                      <SimpleTrendChart data={trendData} dataKey={METRIC_CHART_MAP[chart2Metric].key} color={METRIC_CHART_MAP[chart2Metric].color} isPct={METRIC_CHART_MAP[chart2Metric].isPct} />
                                  </div>
                              </div>
                          </div>
                      </div>
                  </main>
              </div>
          );
      };

      const root = window.ReactDOM.createRoot(document.getElementById('root'));
      root.render(<Dashboard />);
    </script>
  </body>
</html>
