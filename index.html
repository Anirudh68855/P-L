                                          {i < 5 && <div className="hidden md:block absolute top-1/2 -right-4 -translate-y-1/2 z-20 text-slate-300 group-hover:text-white"><Icon name="chevron" size={24} className="-rotate-90" /></div>}
                                      </div>
                                  ))}
                              </div>
                          </div>
                      </div>

                      <div className="p-8 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
                          <div className="flex items-center gap-3">
                              <div className="w-3 h-3 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_15px_rgba(16,185,129,0.5)]"></div>
                              <span className="text-xs font-black text-emerald-600 uppercase tracking-widest">Enterprise Data Integrity Verified</span>
                          </div>
                          <div className="flex gap-4">
                              <button className="px-6 py-3 bg-white border border-black/5 rounded-2xl text-xs font-black text-slate-600 hover:bg-slate-100 transition-all">Download PDF</button>
                          </div>
                      </div>
                  </div>
              </div>
          );
      };

      const AccountsCenter = ({ isOpen, onClose }) => {
          if (!isOpen) return null;
          return (
              <div className="fixed inset-0 z-[6000] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onClick={onClose}></div>
                  <div className="relative bg-white border border-black/5 w-full max-w-md rounded-[48px] shadow-premium overflow-hidden animate-zoom-in">
                      <div className="p-10 border-b border-slate-100 flex items-center justify-between">
                          <h2 className="text-3xl font-black text-slate-900 tracking-tighter">Accounts Center</h2>
                          <button onClick={onClose} className="p-4 hover:bg-slate-100 rounded-2xl transition-colors">
                              <Icon name="x" size={24} className="text-slate-400" />
                          </button>
                      </div>
                      <div className="p-10 space-y-10">
                          <div className="flex items-center gap-6 p-6 bg-slate-50 rounded-[32px] border border-black/5">
                              <div className="w-20 h-20 bg-gradient-to-br from-indigo-500 via-purple-600 to-indigo-700 rounded-full flex items-center justify-center text-white text-3xl font-black shadow-xl ring-4 ring-white">NB</div>
                              <div>
                                  <h3 className="text-xl font-black text-slate-900">Ninjacart Business</h3>
                                  <p className="text-[11px] text-slate-500 font-black uppercase tracking-widest mt-1">Enterprise Master Access</p>
                              </div>
                          </div>
                          <div className="space-y-6">
                              <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">System Controls</p>
                              {[
                                  { icon: "settings", label: "Executive Profile", sub: "Personal identity & access levels" },
                                  { icon: "zap", label: "Login & Security", sub: "Authentication protocols" },
                                  { icon: "pie", label: "Interface Layout", sub: "UI density & color preferences" }
                              ].map((item, i) => (
                                  <div key={i} className="flex items-center gap-5 p-5 hover:bg-slate-50 rounded-3xl cursor-pointer transition-all group border border-transparent hover:border-black/5">
                                      <div className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm group-hover:scale-110 transition-transform"><Icon name={item.icon} size={20} className="text-indigo-600" /></div>
                                      <div className="flex-1">
                                          <p className="text-sm font-black text-slate-900">{item.label}</p>
                                          <p className="text-[10px] text-slate-400 font-bold mt-0.5">{item.sub}</p>
                                      </div>
                                      <Icon name="chevron" size={16} className="text-slate-300 group-hover:text-indigo-400 group-hover:translate-x-1 transition-all" />
                                  </div>
                              ))}
                          </div>
                      </div>
                      <div className="p-8 bg-slate-50 border-t border-slate-100 text-center">
                          <button className="text-rose-600 text-xs font-black uppercase tracking-[0.2em] hover:text-rose-700 transition-colors">Terminate Executive Session</button>
                      </div>
                  </div>
              </div>
          );
      };

      // EditableRow was removed in favor of Drawer input

      const Dashboard = () => {
          const [view, setView] = useState("actual");
          const [month, setMonth] = useState("Apr");
          const [year, setYear] = useState("2026");
          const [rawSheetData, setRawSheetData] = useState([]);
          const [loading, setLoading] = useState(true);
          const [showDrawer, setShowDrawer] = useState(false);
          const [inputs, setInputs] = useState({});
          const [activeDrawerBu, setActiveDrawerBu] = useState(SUB_BUS[0].key);
          const [selectedMetric, setSelectedMetric] = useState(null);
          const [selectedBuDetail, setSelectedBuDetail] = useState(null);
          const [showSummary, setShowSummary] = useState(false);
          const [chart1Metric, setChart1Metric] = useState("Gross Margin %");
          const [chart2Metric, setChart2Metric] = useState("CM3");
          const [chartRange, setChartRange] = useState("6M"); // 1M (selected only), 3M, 6M, 12M, CUSTOM
          const [customRange, setCustomRange] = useState({ startMonth: "Nov", startYear: "2025", endMonth: "Apr", endYear: "2026" });
          const [showRangePicker, setShowRangePicker] = useState(false);
          const [allOverrides, setAllOverrides] = useState({}); // { month: { bu_key: { field: value } } }

          const METRIC_CHART_MAP = {
              "GMV": { key: "gmv", isPct: false, color: "#f97316", desc: "Total gross merchandise value (Lakhs)" },
              "Gross Margin %": { key: "marginPct", isPct: true, color: "#4f46e5", desc: "Network blended profitability timeline" },
              "Gross Margin": { key: "margin", isPct: false, color: "#6366f1", desc: "Total trade margin (Lakhs)" },
              "CM1": { key: "cm1", isPct: false, color: "#0ea5e9", desc: "Post-logistics margin (Lakhs)" },
              "CM2": { key: "cm2", isPct: false, color: "#3b82f6", desc: "Post operations margin (Lakhs)" },
              "CM3": { key: "cm3", isPct: false, color: "#059669", desc: "Monthly contribution margin tier 3 (Lakhs)" },
              "Net CM3": { key: "netCm3", isPct: false, color: "#e11d48", desc: "Final bottomline after provisions (Lakhs)" }
          };
          const [showComparisonSummary, setShowComparisonSummary] = useState(false);
          const [showAccounts, setShowAccounts] = useState(false);
          const [regionFilter, setRegionFilter] = useState('dom_fruits');
          const [compareLeft, setCompareLeft] = useState('pomo_ka');
          const [compareRight, setCompareRight] = useState('shimla_apple_fresh');

          useEffect(() => {
              const load = async () => {
                  try {
                      const res = await fetch(SHEET_URL);
                      const text = await res.text();
                      const data = parseCSV(text);
                      setRawSheetData(data);
                      setLoading(false);
                  } catch (e) {
                      console.error("Failed to load sheet", e);
                      setLoading(false);
                  }
              };
              load();
          }, []);

          const mapRowToBU = (row) => {
              const mark = (row['Mark'] || "").toUpperCase();
              const channel = (row['Channel'] || "").toLowerCase();
              const market = (row['Source Market'] || "").toLowerCase();

              // Surgical Column F (Index 5) check for Mode
              const rawMode = (row._rawValues && row._rawValues[5] ? String(row._rawValues[5]) : "").toUpperCase();
              const isKnownParty =
                  rawMode.includes("KP") ||
                  rawMode.includes("KNOWN PARTY") ||
                  rawMode.includes("KNOWN PAIR") ||
                  rawMode.includes("KNOWN PARE");

              if (isKnownParty) return "others";

              if (mark.includes("POMO")) {
                  if (channel === "ninjacart") {
                      if (market.includes("karnataka")) return "pomo_ka";
                      if (market.includes("maha")) return "pomo_mh";
                      if (market.includes("rajasthan") || market.includes("gujarat")) return "pomo_rj_gj";
                  }
              }
              if (channel.includes("cc")) {
                  if (market.includes("karnataka")) return "ka_cc";
                  if (market.includes("maha")) return "mh_cc";
              }
              if (mark.includes("MANGO")) return "mango";
              if (mark.includes("SHIMLA") || mark.includes("APPLE")) {
                  return mark.includes("CA") ? "shimla_apple_fresh" : "shimla_apple_ca";
              }
              if (mark.includes("DOM") || mark.includes("FRUIT")) return "dom_fruits";
              return "others";
          };

          const baseAggregated = useMemo(() => {
              const yearFull = year;
              const monthMap = {
                  "Jan": "Jan", "Feb": "Feb", "Mar": "March", "Apr": "April", "May": "May", "Jun": "June",
                  "Jul": "July", "Aug": "August", "Sep": "September", "Oct": "October", "Nov": "November", "Dec": "December"
              };
              const targetMonth = (monthMap[month] || month).toLowerCase();

              const buckets = {};
              SUB_BUS.forEach(b => buckets[b.key] = { gmv: 0, margin: 0, boxes: 0 });

              rawSheetData.forEach(row => {
                  const rowYear = String(row['Year'] || "").trim();
                  const rowMonth = (row['Closure'] || "").trim().toLowerCase();

                  if (rowYear === yearFull && (rowMonth === targetMonth || rowMonth.includes(targetMonth))) {
                      const key = mapRowToBU(row);
                      if (key && key !== "dom_fruits" && buckets[key]) {
                          const salesReceivable = parseFloat(row['Sales Receivable']) || 0;
                          buckets[key].gmv += parseFloat(row['Sales (GMV)']) || 0;
                          // Margin should only include fully received/closed rows; open receivable rows
                          // were making Mango show 1.0L instead of 0.8L.
                          if (salesReceivable <= 0) buckets[key].margin += parseFloat(row['Margin']) || 0;
                          buckets[key].boxes += parseFloat(row['No. of Boxes']) || 0;
                      }
                  }
              });

              // Convert to Lakhs but KEEP full precision for math.
              // Display formatters (fmtL / fmtPct) handle rounding at render time,
              // so derived values like Gross Trade Margin % stay accurate.
              Object.keys(buckets).forEach(k => {
                  buckets[k].gmv = buckets[k].gmv / 100000;
                  buckets[k].margin = buckets[k].margin / 100000;
              });

              return buckets;
          }, [rawSheetData, month, year]);

          // Load persisted manual overrides for the active year/month from Lovable Cloud
          useEffect(() => {
              let cancelled = false;
              (async () => {
                  const rows = await fetchOverrides(year, month);
                  if (cancelled) return;
                  const grouped = {};
                  rows.forEach(r => {
                      grouped[r.bu_key] = grouped[r.bu_key] || {};
                      grouped[r.bu_key][r.field] = Number(r.value);
                  });
                  setInputs(grouped);
              })();
              return () => { cancelled = true; };
          }, [year, month]);

          // Load ALL overrides for the year (used to power multi-month trend charts with real DB values)
          useEffect(() => {
              let cancelled = false;
              (async () => {
                  const rows = await fetchAllOverridesForYear(year);
                  if (cancelled) return;
                  const grouped = {};
                  rows.forEach(r => {
                      grouped[r.month] = grouped[r.month] || {};
                      grouped[r.month][r.bu_key] = grouped[r.month][r.bu_key] || {};
                      grouped[r.month][r.bu_key][r.field] = Number(r.value);
                  });
                  setAllOverrides(grouped);
              })();
              return () => { cancelled = true; };
          }, [year, month]);

          const updateInput = (buKey, field, val) => {
              setInputs(prev => ({
                  ...prev,
                  [buKey]: {
                      ...(prev[buKey] || {}),
                      [field]: val
                  }
              }));
              // Persist to Lovable Cloud (fire-and-forget)
              saveOverride(year, month, buKey, field, val);
          };

          const activeData = useMemo(() => {
              const merged = {};

              // First process individual BUs
              SUB_BUS.filter(b => b.key !== 'dom_fruits').forEach(b => {
                  const base = baseAggregated[b.key] || { gmv: 0, margin: 0, boxes: 0 };
                  const overrides = inputs[b.key] || {};
                  const buData = { ...base, ...overrides };

                  buData.dncn = buData.dncn || 0;
                  // Gross Trade Margin is ALWAYS derived = Margin + DN & CN (no manual override)
                  buData.grossTradeMargin = (parseFloat(buData.margin) || 0) + (parseFloat(buData.dncn) || 0);

                  buData.storageLogistics = buData.storageLogistics || 0;
                  buData.workingCapital = buData.workingCapital || 0;
                  buData.capitalCredit = buData.capitalCredit || 0;
                  buData.marginOtherBU = buData.marginOtherBU || 0;
                  buData.cm2Costs = buData.cm2Costs || 0;
                  buData.manpower = buData.manpower || 0;
                  buData.travel = buData.travel || 0;
                  buData.other = buData.other || 0;
                  buData.badDebts = buData.badDebts || 0;
                  buData.provReversal = buData.provReversal || 0;

                  merged[b.key] = buData;
              });

              // Calculate domestic fruits aggregate
              const domFruits = { gmv: 0, margin: 0, dncn: 0, grossTradeMargin: 0, boxes: 0, storageLogistics: 0, workingCapital: 0, capitalCredit: 0, marginOtherBU: 0, cm2Costs: 0, manpower: 0, travel: 0, other: 0, badDebts: 0, provReversal: 0 };
              SUB_BUS.filter(b => b.key !== 'dom_fruits').forEach(b => {
                  const buData = merged[b.key];
                  Object.keys(domFruits).forEach(k => { domFruits[k] += buData[k] || 0; });
              });
              // Apply aggregate-level manual overrides (so editing the "Domestic Fruits" tab works)
              const aggOverrides = inputs['dom_fruits'] || {};
              Object.keys(aggOverrides).forEach(k => { domFruits[k] = aggOverrides[k]; });
              merged['dom_fruits'] = domFruits;

              return merged;
          }, [baseAggregated, inputs]);

          const computed = useMemo(() => {
              const out = {};
              const subBuKeys = SUB_BUS.filter(b => b.key !== "dom_fruits").map(b => b.key);

              // Totals from aggregate (Domestic Fruits) — these are GMV-distributed across BUs
              const totalGmv = subBuKeys.reduce((sum, k) => sum + (activeData[k].gmv || 0), 0);
              const totalCm2Costs = activeData["dom_fruits"].cm2Costs || 0;
              const totalWorkingCapital = activeData["dom_fruits"].workingCapital || 0;
              const totalCapitalCredit = activeData["dom_fruits"].capitalCredit || 0;

              const distribute = (total, buGmv) => totalGmv > 0 ? total * (buGmv / totalGmv) : 0;

              // 1. Process sub-BUs. Distribute aggregate (Domestic Fruits) costs by GMV ONLY when
              //    the sub-BU has no manual override for that field.
              subBuKeys.forEach(k => {
                  const buInput = { ...activeData[k] };
                  const overrides = inputs[k] || {};
                  if (overrides.cm2Costs === undefined)       buInput.cm2Costs = distribute(totalCm2Costs, buInput.gmv);
                  if (overrides.workingCapital === undefined) buInput.workingCapital = distribute(totalWorkingCapital, buInput.gmv);
                  if (overrides.capitalCredit === undefined)  buInput.capitalCredit = distribute(totalCapitalCredit, buInput.gmv);
                  out[k] = compute(buInput);
              });


              // 2. Process Domestic Fruits (Aggregate)
              const fields = ['gmv', 'margin', 'dncn', 'grossTradeMargin', 'storageLogistics', 'workingCapital', 'capitalCredit', 'marginOtherBU', 'cm2Costs', 'manpower', 'travel', 'other', 'badDebts', 'provReversal'];
              const distributedFields = new Set(['cm2Costs', 'workingCapital', 'capitalCredit']);
              const aggOverrides = inputs['dom_fruits'] || {};
              const aggregateInput = {};
              fields.forEach(f => {
                  if (distributedFields.has(f) || aggOverrides[f] !== undefined) {
                      // Use the master input directly (manual override or distributed master)
                      aggregateInput[f] = activeData["dom_fruits"][f] || 0;
                  } else {
                      aggregateInput[f] = subBuKeys.reduce((sum, k) => sum + (activeData[k][f] || 0), 0);
                  }
              });
              out["dom_fruits"] = compute(aggregateInput);

              return out;
          }, [activeData, inputs]);

          const trendData = useMemo(() => {
              if (!rawSheetData.length) return [];
              const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
              const monthMap = { "Jan": "Jan", "Feb": "Feb", "Mar": "March", "Apr": "April", "May": "May", "Jun": "June", "Jul": "July", "Aug": "August", "Sep": "September", "Oct": "October", "Nov": "November", "Dec": "December" };
              const subBuKeys = SUB_BUS.filter(b => b.key !== "dom_fruits").map(b => b.key);
              const fields = ['gmv', 'margin', 'dncn', 'grossTradeMargin', 'storageLogistics', 'workingCapital', 'capitalCredit', 'marginOtherBU', 'cm2Costs', 'manpower', 'travel', 'other', 'badDebts', 'provReversal'];
              const currentIdx = months.indexOf(month);
              const rangeMap = { "1M": 1, "3M": 3, "6M": 6, "12M": 12 };
              // Build list of {mIdx, y} entries to iterate
              const entries = [];
              if (chartRange === "CUSTOM") {
                  const sIdx = months.indexOf(customRange.startMonth);
                  const eIdx = months.indexOf(customRange.endMonth);
                  const sY = parseInt(customRange.startYear);
                  const eY = parseInt(customRange.endYear);
                  let cy = sY, ci = sIdx;
                  // Safety cap to avoid infinite loops
                  for (let guard = 0; guard < 60; guard++) {
                      entries.push({ mIdx: ci, y: cy });
                      if (ci === eIdx && cy === eY) break;
                      ci++;
                      if (ci > 11) { ci = 0; cy++; }
                      if (cy > eY + 1) break;
                  }
              } else {
                  const span = rangeMap[chartRange] || 1;
                  for (let i = span - 1; i >= 0; i--) {
                      let mIdx = currentIdx - i;
                      let y = parseInt(year);
                      if (mIdx < 0) { mIdx += 12; y -= 1; }
                      entries.push({ mIdx, y });
                  }
              }
              const results = [];

              for (const { mIdx, y } of entries) {
                  const mName = months[mIdx];
                  const mFull = (monthMap[mName] || mName).toLowerCase();

                  // 1) Aggregate raw sheet GMV/margin per sub-BU for this month
                  const buckets = {};
                  subBuKeys.forEach(k => buckets[k] = { gmv: 0, margin: 0 });
                  rawSheetData.forEach(row => {
                      const rY = String(row['Year'] || "").trim();
                      const rM = (row['Closure'] || "").trim().toLowerCase();
                      if (rY === String(y) && (rM === mFull || rM.includes(mFull))) {
                          const key = mapRowToBU(row);
                          if (key && key !== "dom_fruits" && buckets[key]) {
                              const salesReceivable = parseFloat(row['Sales Receivable']) || 0;
                              buckets[key].gmv += (parseFloat(row['Sales (GMV)']) || 0) / 100000;
                              if (salesReceivable <= 0) buckets[key].margin += (parseFloat(row['Margin']) || 0) / 100000;
                          }
                      }
                  });

                  // 2) Merge per-sub-BU DB overrides into the buckets
                  const monthOverrides = (allOverrides[mName] || {});
                  const mergedSub = {};
                  subBuKeys.forEach(k => {
                      mergedSub[k] = { ...buckets[k], ...(monthOverrides[k] || {}) };
                  });

                  // 3) Build dom_fruits aggregate exactly like the main dashboard does:
                  //    sum of sub-BU fields, then overlay any dom_fruits-level override (dncn, costs, etc.)
                  const aggOverrides = monthOverrides['dom_fruits'] || {};
                  const aggregateInput = {};
                  fields.forEach(f => {
                      const summed = subBuKeys.reduce((sum, k) => sum + (Number(mergedSub[k][f]) || 0), 0);
                      aggregateInput[f] = aggOverrides[f] !== undefined ? Number(aggOverrides[f]) : summed;
                  });
                  const total = compute(aggregateInput);

                  results.push({
                      label: `${mName}`,
                      gmv: total.gmv,
                      margin: total.grossTradeMargin,
                      marginPct: total.grossTradeMarginPct,
                      cm1: total.netTradeMargin,
                      cm2: total.cm2,
                      cm3: total.cm3,
                      netCm3: total.netCM3
                  });
              }
              return results;
          }, [rawSheetData, month, year, chartRange, allOverrides, customRange]);

          // updateInput was moved up
          const consolidated = useMemo(() => {
              return computed[regionFilter] || computed["dom_fruits"];
          }, [computed, regionFilter]);

          const topBU = useMemo(() => {
              const sorted = [...SUB_BUS].sort((a,b) => computed[b.key].netCM3Pct - computed[a.key].netCM3Pct);
              return { name: sorted[0]?.name || "N/A", val: computed[sorted[0]?.key]?.netCM3Pct || 0 };
          }, [computed]);

          const lowBU = useMemo(() => {
              const sorted = [...SUB_BUS].sort((a,b) => computed[a.key].netCM3Pct - computed[b.key].netCM3Pct);
              return { name: sorted[0]?.name || "N/A", val: computed[sorted[0]?.key]?.netCM3Pct || 0 };
          }, [computed]);
          const compareDeltaPct = useMemo(() => {
              return (computed[compareLeft]?.netCM3Pct || 0) - (computed[compareRight]?.netCM3Pct || 0);
          }, [computed, compareLeft, compareRight]);

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center gap-8 bg-slate-50">
                    <img
                        src="https://ninjacart.com/wp-content/uploads/2023/10/cropped-Group-207-1.png"
                        alt="Ninjacart"
                        className="nc-logo-sweep"
                        style={{width:'200px', height:'auto', objectFit:'contain'}}
                    />
                    <div className="flex flex-col items-center gap-3">
                        <div className="flex gap-1.5">
                            <span className="w-2 h-2 rounded-full bg-slate-700 animate-pulse" style={{animationDelay:'0s'}}></span>
                            <span className="w-2 h-2 rounded-full bg-slate-700 animate-pulse" style={{animationDelay:'0.2s'}}></span>
                            <span className="w-2 h-2 rounded-full bg-slate-700 animate-pulse" style={{animationDelay:'0.4s'}}></span>
                        </div>
                        <p className="text-slate-500 text-[11px] font-bold uppercase tracking-[0.4em]">Syncing P&amp;L Intelligence...</p>
                    </div>
                </div>
            );

          return (
              <div className="min-h-screen bg-slate-50 text-slate-600 font-sans">
                  <Drawer isOpen={showDrawer} onClose={() => setShowDrawer(false)} inputs={inputs} activeData={activeData} activeBu={activeDrawerBu} onBuChange={setActiveDrawerBu} onUpdate={updateInput} computedData={computed} />
                  <MetricModal isOpen={!!selectedMetric} onClose={() => setSelectedMetric(null)} metric={selectedMetric} data={computed} fmt={selectedMetric?.fmt || fmtL} onSelectBu={setSelectedBuDetail} />
                  <BuDetailModal isOpen={!!selectedBuDetail} onClose={() => setSelectedBuDetail(null)} buKey={selectedBuDetail} data={computed} />
                  <SummaryModal isOpen={showSummary} onClose={() => setShowSummary(false)} data={consolidated} trendData={trendData} />
                  <ComparisonSummaryModal isOpen={showComparisonSummary} onClose={() => setShowComparisonSummary(false)} buLeftKey={compareLeft} buRightKey={compareRight} data={computed} />
                  <AccountsCenter isOpen={showAccounts} onClose={() => setShowAccounts(false)} />

                  <header className="sticky top-0 z-50 glass-header px-3 py-3 md:px-8 md:py-4 flex flex-wrap items-center justify-between gap-3 shadow-sm">
                      <div className="flex items-center gap-3 md:gap-12 flex-wrap">
                          <div className="flex items-center gap-3 md:gap-4 group cursor-pointer" onClick={() => setShowDrawer(true)}>
                              <div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform">
                                  <Icon name="menu" size={24} className="text-white" />
                              </div>
                              <div className="flex flex-col">
                                  <img src="https://ninjacart.com/wp-content/uploads/2023/10/cropped-Group-207-1.png" alt="Ninjacart" className="h-5 object-contain object-left" />
                                  <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">P&L Intelligence</span>
                              </div>
                          </div>
                          <div className="hidden md:block h-8 w-px bg-black/5"></div>
                          <div className="bg-white/50 px-4 py-2 rounded-2xl border border-black/5 hover:border-indigo-200 transition-all cursor-pointer min-w-[180px] md:min-w-[200px]">
                              <CustomSelect
                                  value={regionFilter}
                                  options={SUB_BUS}
                                  onChange={setRegionFilter}
                                  data={computed}
                                  className="text-xs text-indigo-600"
                                  icon="filter"
                              />
                          </div>
                      </div>

<script>
	// Don't show the lovable-badge if the page is in an iframe or if it's being rendered by puppeteer (screenshot service)
	if (window.self !== window.top || navigator.userAgent.includes('puppeteer')) {
		// the page is in an iframe
		var badge = document.getElementById('lovable-badge');
		if (badge) {
			badge.style.display = 'none';
		}
	}

	// Add click event listener to close button with animation
	var closeButton = document.getElementById('lovable-badge-close');
	if (closeButton) {
		closeButton.addEventListener('click', function(event) {
			event.preventDefault();
			event.stopPropagation();
			var badge = document.getElementById('lovable-badge');
			if (badge) {
				badge.classList.add('closing');
				setTimeout(function() {
					if (badge) {
						badge.style.display = 'none';
					}
				}, 240);
			}
		});
	}
