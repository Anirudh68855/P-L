        .glass-header { background: rgba(248, 250, 252, 0.8); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(0,0,0,0.05); }

        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

<body class="text-foreground antialiased selection:bg-indigo-500/30">
    <div id="root" class="w-full">
        <div className="min-h-screen flex items-center justify-center bg-slate-50">
            <div className="flex flex-col items-center gap-4">
                <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                <p className="text-slate-500 font-medium tracking-widest text-[10px] uppercase">Booting Finance Intelligence...</p>
            </div>
        </div>
    </div>

    <script>
        window.onerror = function(msg, url, line, col, error) {
            document.getElementById('root').innerHTML = `
                <div class="p-16 text-slate-200 bg-slate-900/50 backdrop-blur-2xl rounded-[48px] shadow-premium max-w-xl mx-auto mt-20 border border-white/5 animate-zoom-in text-center">
                    <div class="w-20 h-20 bg-rose-500/10 rounded-full flex items-center justify-center mx-auto mb-8 border border-rose-500/20">
                        <span class="text-4xl">⚠️</span>
                    </div>
                    <h2 class="text-3xl font-black mb-4 tracking-tighter text-white">System Breach</h2>
                    <div class="bg-black/40 p-6 rounded-3xl font-mono text-xs mb-8 text-rose-400/80 border border-white/5 leading-relaxed">${msg}</div>
                    <button onclick="location.reload()" class="px-10 py-4 bg-white text-black rounded-2xl text-sm font-black hover:bg-slate-100 transition-all shadow-glow">Reset Dashboard</button>
                </div>
            `;
            return false;
        };
    </script>

    <script type="text/babel">
        // Safety check for React globals
        if (!window.React || !window.ReactDOM) {
            throw new Error("React or ReactDOM not found. Please check your internet connection or reload.");
        }

        const ReactGlobal = window.React;
        const { useState, useMemo, useEffect, Fragment } = ReactGlobal;

        // Global Chart Safety Bridge
        const Lib = window.Recharts || {};
        const LineChart = Lib.LineChart || (({children}) => <div>{children}</div>);
        const Line = Lib.Line || (() => null);
        const ResponsiveContainer = Lib.ResponsiveContainer || (({children}) => <div style={{width:'100%', height:'100%'}}>{children}</div>);
        const CartesianGrid = Lib.CartesianGrid || (() => null);
        const XAxis = Lib.XAxis || (() => null);
        const YAxis = Lib.YAxis || (() => null);
        const Tooltip = Lib.Tooltip || (() => null);
        const LabelList = Lib.LabelList || (() => null);
        const BarChart = Lib.BarChart || (({children}) => <div>{children}</div>);
        const Bar = Lib.Bar || (() => null);
        const Cell = Lib.Cell || (() => null);
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRk_7uILshEOrsvZsMZgDEYQLFJXWxXjV0jGJQ2lyXmMdJnyZdiweYwASZHaug7rw00HzvDjRKq3g_N/pub?gid=1929643988&single=true&output=csv";

        const SUB_BUS = [
            { key: "dom_fruits", name: "Domestic Fruits", short: "Dom. Fruits" },
            { key: "pomo_ka", name: "Pomo KA", short: "Pomo KA" },
            { key: "ka_cc", name: "KA CC", short: "KA CC" },
            { key: "pomo_mh", name: "Pomo MH", short: "Pomo MH" },
            { key: "mh_cc", name: "MH CC", short: "MH CC" },
            { key: "pomo_rj_gj", name: "Pomo RJ/GJ", short: "Pomo RJ/GJ" },
            { key: "mango", name: "Mango", short: "Mango" },
            { key: "shimla_apple_fresh", name: "Shimla Apple - Fresh", short: "Apple Fresh" },
            { key: "shimla_apple_ca", name: "Shimla Apple CA", short: "Apple CA" },
            { key: "others", name: "Others (Known Pair)", short: "Others" },
        ];

        // Robust CSV Parser helper
        const parseCSV = (text) => {
            const lines = text.split(/\r?\n/);
            if (lines.length < 2) return [];
            const headers = lines[0].split(',').map(h => h.trim());
            return lines.slice(1).map(line => {
                const values = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) {
                        values.push(current.trim());
                        current = '';
                    } else current += char;
                }
                values.push(current.trim());
                return headers.reduce((obj, header, index) => {
                    let val = values[index] || "";
                    // Clean numeric strings like "408,168"
                    if (typeof val === 'string') val = val.replace(/^"|"$/g, '').replace(/,/g, '');
                    obj[header] = val;
                    return obj;
                }, {});
            });
        };

        const compute = (i) => {
            const gmv = parseFloat(i.gmv) || 0;
            const grossTradeMargin = parseFloat(i.grossTradeMargin) || 0;
            const grossTradeMarginPct = gmv ? (grossTradeMargin / gmv) * 100 : 0;
            const storageLogistics = parseFloat(i.storageLogistics) || 0;
            const workingCapital = parseFloat(i.workingCapital) || 0;
            const capitalCredit = parseFloat(i.capitalCredit) || 0;
            const marginOtherBU = parseFloat(i.marginOtherBU) || 0;
            const netTradeMargin = grossTradeMargin - storageLogistics - workingCapital - capitalCredit + marginOtherBU;
            const netTradeMarginPct = gmv ? (netTradeMargin / gmv) * 100 : 0;
            const cm2Costs = parseFloat(i.cm2Costs) || 0;
            const cm2 = netTradeMargin - cm2Costs;
            const manpower = parseFloat(i.manpower) || 0;
            const travel = parseFloat(i.travel) || 0;
            const other = parseFloat(i.other) || 0;
            const cm3Costs = manpower + travel + other;
            const cm3 = cm2 - cm3Costs;
            const cm3Pct = gmv ? (cm3 / gmv) * 100 : 0;
            const badDebts = parseFloat(i.badDebts) || 0;
            const provReversal = parseFloat(i.provReversal) || 0;
            const netCM3 = cm3 - badDebts + provReversal;
            const netCM3Pct = gmv ? (netCM3 / gmv) * 100 : 0;
            return {
                gmv, grossTradeMargin, grossTradeMarginPct,
                storageLogistics, workingCapital, capitalCredit, marginOtherBU,
                netTradeMargin, netTradeMarginPct,
                cm2Costs, cm2, cm3Costs, manpower, travel, other, cm3, cm3Pct,
                badDebts, provReversal, netCM3, netCM3Pct
            };
        };

        const aggregate = (results) => {
            const fields = [
                'gmv', 'grossTradeMargin', 'storageLogistics', 'workingCapital', 
                'capitalCredit', 'marginOtherBU', 'cm2Costs', 'manpower', 
                'travel', 'other', 'badDebts', 'provReversal'
            ];
            const base = {};
            fields.forEach(f => {
                base[f] = results.reduce((sum, r) => sum + (r[f] || 0), 0);
            });
            return compute(base);
        };

        const fmtL = (val, dec = 1) => {
            const isNeg = val < 0;
            const absVal = Math.abs(val);
            const str = `₹${absVal.toFixed(dec)}L`;
            return isNeg ? `(${str})` : str;
        };
        const fmtPct = (val) => `${val.toFixed(1)}%`;

        const Icon = ({ name, size = 16, className = "", onClick }) => {
            const icons = {
                menu: <path d="M4 6h16M4 12h16M4 18h16" />,
                x: <path d="M18 6L6 18M6 6l12 12" />,
                filter: <path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z" />,
                chevron: <path d="M6 9l6 6 6-6" />,
                check: <path d="M20 6L9 17l-5-5" />,
                logo: <Fragment>
                    <path d="M12 2.5a9.5 9.5 0 0 1 7.7 4" stroke="#F89E22" strokeWidth="3" />
                    <path d="M19.7 6.5a9.5 9.5 0 0 1 0 11" stroke="#33B34A" strokeWidth="3" />
                    <path d="M19.7 17.5a9.5 9.5 0 0 1-15.4 0" stroke="#EC008C" strokeWidth="3" />
                    <path d="M4.3 17.5a9.5 9.5 0 0 1 0-11" stroke="#2D3092" strokeWidth="3" />
                    <path d="M4.3 6.5a9.5 9.5 0 0 1 7.7-4" stroke="#F89E22" strokeWidth="3" />
                    <path d="M8.5 16.5V7.5l7 9V7.5" stroke="#33B34A" strokeWidth="3.5" strokeLinejoin="round" />
                    <circle cx="15.5" cy="11.5" r="1.5" fill="#33B34A" />
                </Fragment>,
                trending: <path d="M23 6l-9.5 9.5-5-5L1 18" />,
                sparkles: <path d="M12 3l1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3z" />,
                zap: <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />,
                eye: <Fragment><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /></Fragment>,
                target: <Fragment><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" /></Fragment>,
                pie: <Fragment><path d="M21.21 15.89A10 10 0 1 1 8 2.83" /><path d="M22 12A10 10 0 0 0 12 2v10z" /></Fragment>,
                tweak: <Fragment><line x1="4" y1="21" x2="4" y2="14" /><line x1="4" y1="10" x2="4" y2="3" /><line x1="12" y1="21" x2="12" y2="12" /><line x1="12" y1="8" x2="12" y2="3" /><line x1="20" y1="21" x2="20" y2="16" /><line x1="20" y1="12" x2="20" y2="3" /><line x1="2" y1="14" x2="6" y2="14" /><line x1="10" y1="8" x2="14" y2="8" /><line x1="18" y1="16" x2="22" y2="16" /></Fragment>,
                download: <Fragment><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></Fragment>,
                spreadsheet: <Fragment><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><path d="M14 2v6h6" /></Fragment>,
                file: <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />,
                printer: <Fragment><path d="M6 9V2h12v7" /><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" /><path d="M6 14h12v8H6z" /></Fragment>,
                search: <Fragment><circle cx="11" cy="11" r="8" /><path d="M21 21l-4.35-4.35" /></Fragment>,
                settings: <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />,
                bell: <Fragment><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" /><path d="M13.73 21a2 2 0 0 1-3.46 0" /></Fragment>,
                "file-spreadsheet": <Fragment><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><path d="M14 2v6h6" /><path d="M8 13h2" /><path d="M14 13h2" /><path d="M8 17h2" /><path d="M14 17h2" /></Fragment>,
                "file-text": <Fragment><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><path d="M14 2v6h6" /><path d="M8 13h8" /><path d="M8 17h8" /></Fragment>,
                "check-circle": <Fragment><circle cx="12" cy="12" r="10" /><path d="M9 12l2 2 4-4" /></Fragment>,
                user: <Fragment><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></Fragment>
            };
            return (
                <svg onClick={onClick} viewBox="0 0 24 24" fill="none" stroke={name === 'logo' ? undefined : "currentColor"} strokeWidth={name === 'logo' ? "3" : "2.5"} strokeLinecap="round" strokeLinejoin="round" style={{width: size, height: size}} className={`${className} ${onClick ? 'cursor-pointer' : ''}`}>
                    {icons[name] || icons.menu}
                </svg>
            );
        };

        const CustomSelect = ({ value, options, onChange, className = "", icon }) => {
            const [isOpen, setIsOpen] = useState(false);
            const containerRef = ReactGlobal.useRef(null);
            
            useEffect(() => {
                const handleClick = (e) => {
                    if (containerRef.current && !containerRef.current.contains(e.target)) setIsOpen(false);
                };
                window.addEventListener('click', handleClick);
                return () => window.removeEventListener('click', handleClick);
            }, []);

            const selected = options.find(o => o.key === value || o === value);
            const selectedLabel = typeof selected === 'object' ? selected.name : (selected || value);

            return (
                <div className={`relative ${className}`} ref={containerRef}>
                    <div 
                        onClick={(e) => { e.stopPropagation(); setIsOpen(!isOpen); }}
                        className="flex items-center justify-between cursor-pointer group"
                    >
                        <div className="flex items-center gap-2">
                            {icon && <Icon name={icon} size={14} className="text-slate-400" />}
                            <span className="font-black truncate">{selectedLabel}</span>
                        </div>
                        <Icon name="chevron" size={12} className={`text-slate-400 transition-transform ${isOpen ? 'rotate-180' : ''}`} />
                    </div>
                    
                    {isOpen && (
                        <div className="absolute top-full left-0 right-0 mt-2 z-[9999] bg-white/90 backdrop-blur-2xl border border-black/5 rounded-3xl shadow-premium overflow-hidden animate-slide-up max-h-[300px] overflow-y-auto custom-scrollbar min-w-[200px]">
                            {options.map((opt, i) => {
                                const key = typeof opt === 'object' ? opt.key : opt;
                                const label = typeof opt === 'object' ? opt.name : opt;
                                const isActive = key === value;
                                return (
                                    <div 
                                        key={i}
                                        onClick={() => { onChange(key); setIsOpen(false); }}
                                        className={`px-5 py-3 text-[11px] font-bold transition-colors cursor-pointer flex items-center justify-between ${isActive ? 'bg-indigo-600 text-white' : 'text-slate-600 hover:bg-slate-50'}`}
                                    >
                                        {label}
                                        {isActive && <Icon name="check" size={12} />}
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        const Drawer = ({ isOpen, onClose, inputs, activeData, activeBu, onBuChange, onUpdate }) => {
            if (!isOpen) return null;
            const isAggregate = activeBu === 'dom_fruits';
            const buData = activeData[activeBu] || { 
                gmv: 0, grossTradeMargin: 0, storageLogistics: 0, workingCapital: 0, 
                capitalCredit: 0, marginOtherBU: 0, cm2Costs: 0, manpower: 0, 
                travel: 0, other: 0, badDebts: 0, provReversal: 0 
            };
            
            const InputField = ({ label, field, val }) => (
                <div className={`flex flex-col gap-1 ${isAggregate ? 'opacity-50' : ''}`}>
                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">{label}</label>
                    <div className={`flex items-center bg-slate-50 border border-slate-100 rounded-xl px-3 py-2 transition-all ${isAggregate ? 'cursor-not-allowed' : 'focus-within:border-slate-900 focus-within:bg-white'}`}>
                        <span className="text-slate-400 text-xs mr-2 font-bold">₹</span>
                        <input 
                            type="number" 
                            value={val || 0} 
                            disabled={isAggregate}
                            onChange={(e) => onUpdate(activeBu, field, e.target.value)} 
                            className="bg-transparent text-sm font-bold text-slate-900 outline-none w-full disabled:cursor-not-allowed" 
                        />
                        <span className="text-slate-400 text-[10px] ml-2 font-bold uppercase">L</span>
                    </div>
                </div>
            );

            return (
                <div className="fixed inset-0 z-[2000] flex justify-start">
                    <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="relative w-full max-w-lg bg-white h-full shadow-hover flex flex-col animate-slide-left">
                        <div className="p-6 border-b border-slate-100 flex items-center justify-between sticky top-0 bg-white z-10">
                            <div className="flex items-center gap-3"><h2 className="text-lg font-black text-slate-900">Inputs & Filters</h2></div>
                            <div className="flex items-center gap-4"><button className="text-xs font-bold text-slate-400 hover:text-slate-900">Reset</button><button onClick={onClose} className="p-2 hover:bg-slate-100 rounded-xl transition-colors"><Icon name="x" size={18} className="text-slate-400" /></button></div>
                        </div>
                        <div className="flex items-center gap-4 px-6 py-4 overflow-x-auto custom-scrollbar border-b border-slate-50">
                            {SUB_BUS.map(bu => (<button key={bu.key} onClick={() => onBuChange(bu.key)} className={`whitespace-nowrap px-4 py-2 rounded-xl text-[10px] font-black transition-all ${activeBu === bu.key ? 'bg-slate-900 text-white' : 'text-slate-400 hover:text-slate-900'}`}>{bu.name}</button>))}
                        </div>
                        <div className="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-8">
                            <div className="space-y-1">
                                <span className="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em]">Sub BU</span>
                                <h3 className="text-2xl font-black text-slate-900 flex items-center gap-2">
                                    {SUB_BUS.find(b => b.key === activeBu).name}
                                    {isAggregate && <span className="text-[10px] bg-indigo-50 text-indigo-500 px-2 py-0.5 rounded-full font-bold">CALCULATED TOTAL</span>}
                                </h3>
                                {isAggregate && <p className="text-[10px] text-slate-400 font-medium">This vertical is the aggregate of all sub-BUs. Edit individual BUs to change these values.</p>}
                            </div>
                            <div className="p-6 rounded-3xl border border-slate-100 space-y-6 relative"><div className="absolute -top-3 left-6 bg-white px-3 text-[10px] font-black text-slate-400 uppercase tracking-widest border border-slate-100 rounded-full">Gross Margin</div><div className="grid grid-cols-2 gap-6"><InputField label="GMV" field="gmv" val={buData.gmv} /><InputField label="Gross Trade Margin" field="grossTradeMargin" val={buData.grossTradeMargin} /></div></div>

                                <div>

                                </div>

                            <div className="space-y-6">
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">System Controls</p>
                                {[
                                    { icon: "settings", label: "Executive Profile", sub: "Personal identity & access levels" },
                                    { icon: "zap", label: "Login & Security", sub: "Authentication protocols" },
                                    { icon: "pie", label: "Interface Layout", sub: "UI density & color preferences" }

                                        <div className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm group-hover:scale-110 transition-transform"><Icon name={item.icon} size={20} className="text-indigo-600" /></div>
                                        <div className="flex-1">

        const Dashboard = () => {
            const [view, setView] = useState("actual");
            const [month, setMonth] = useState("Apr");
            const [year, setYear] = useState("'26");
            const [rawSheetData, setRawSheetData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showDrawer, setShowDrawer] = useState(false);
            const [inputs, setInputs] = useState({});
            const [activeDrawerBu, setActiveDrawerBu] = useState(SUB_BUS[0].key);
            const [selectedMetric, setSelectedMetric] = useState(null);
            const [selectedBuDetail, setSelectedBuDetail] = useState(null);
            const [showSummary, setShowSummary] = useState(false);
            const [showAccounts, setShowAccounts] = useState(false);
            const [regionFilter, setRegionFilter] = useState('dom_fruits');
            const [compareLeft, setCompareLeft] = useState('pomo_ka');
            const [compareRight, setCompareRight] = useState('shimla_apple_fresh');

            useEffect(() => {
                const load = async () => {
                    try {
                        const res = await fetch(SHEET_URL);
                        const text = await res.text();
                        const data = parseCSV(text);
                        setRawSheetData(data);
                        setLoading(false);
                    } catch (e) {
                        console.error("Failed to load sheet", e);
                        setLoading(false);
                    }
                };
                load();
            }, []);

            const mapRowToBU = (row) => {
                const mark = (row['Mark'] || "").toUpperCase();
                const channel = (row['Channel'] || "").toLowerCase();
                const market = (row['Source Market'] || "").toLowerCase();

                if (mark.includes("POMO")) {
                    if (channel === "ninjacart") {
                        if (market.includes("karnataka")) return "pomo_ka";
                        if (market.includes("maha")) return "pomo_mh";
                        if (market.includes("rajasthan") || market.includes("gujarat")) return "pomo_rj_gj";
                    }
                }
                if (channel.includes("cc")) {
                    if (market.includes("karnataka")) return "ka_cc";
                    if (market.includes("maha")) return "mh_cc";
                }
                if (mark.includes("MANGO")) return "mango";
                if (mark.includes("SHIMLA") || mark.includes("APPLE")) {
                    return mark.includes("CA") ? "shimla_apple_ca" : "shimla_apple_fresh";
                }
                if (mark.includes("DOM") || mark.includes("FRUIT")) return "dom_fruits";
                return "others";
            };

            const liveAggregated = useMemo(() => {
                const yearFull = "20" + year.replace("'", "");
                const monthMap = { 
                    "Jan": "Jan", "Feb": "Feb", "Mar": "March", "Apr": "April", "May": "May", "Jun": "June",
                    "Jul": "July", "Aug": "August", "Sep": "September", "Oct": "October", "Nov": "November", "Dec": "December"
                };
                const targetMonth = (monthMap[month] || month).toLowerCase();

                const buckets = {};
                SUB_BUS.forEach(b => buckets[b.key] = { gmv: 0, grossTradeMargin: 0, boxes: 0 });

                rawSheetData.forEach(row => {
                    const rowYear = String(row['Year'] || "").trim();
                    const rowMonth = (row['Closure'] || "").trim().toLowerCase();
                    
                    if (rowYear === yearFull && (rowMonth === targetMonth || rowMonth.includes(targetMonth))) {
                        const key = mapRowToBU(row);
                        if (key && key !== "dom_fruits" && buckets[key]) {
                            buckets[key].gmv += parseFloat(row['Sales (GMV)']) || 0;
                            buckets[key].grossTradeMargin += parseFloat(row['Margin']) || 0;
                            buckets[key].boxes += parseFloat(row['No. of Boxes']) || 0;
                        }
                    }
                });

                const subBuKeys = SUB_BUS.filter(b => b.key !== "dom_fruits").map(b => b.key);
                subBuKeys.forEach(k => {
                    buckets["dom_fruits"].gmv += buckets[k].gmv;
                    buckets["dom_fruits"].grossTradeMargin += buckets[k].grossTradeMargin;
                    buckets["dom_fruits"].boxes += buckets[k].boxes;
                });

                Object.keys(buckets).forEach(k => {
                    buckets[k].gmv = buckets[k].gmv / 100000;
                    buckets[k].grossTradeMargin = buckets[k].grossTradeMargin / 100000;
                    buckets[k].storageLogistics = 0;
                    buckets[k].workingCapital = 0;
                    buckets[k].capitalCredit = 0;
                    buckets[k].marginOtherBU = 0;
                    buckets[k].cm2Costs = 0;
                    buckets[k].manpower = 0;
                    buckets[k].travel = 0;
                    buckets[k].other = 0;
                    buckets[k].badDebts = 0;
                    buckets[k].provReversal = 0;
                });

                return buckets;
            }, [rawSheetData, month, year]);

            const activeData = useMemo(() => {
                const merged = {};
                SUB_BUS.forEach(b => {
                    const base = liveAggregated[b.key] || {};
                    const overrides = inputs[b.key] || {};
                    merged[b.key] = { ...base, ...overrides };
                });
                return merged;
            }, [liveAggregated, inputs]);

            const computed = useMemo(() => {
                const out = {};
                const subBuKeys = SUB_BUS.filter(b => b.key !== "dom_fruits").map(b => b.key);
                subBuKeys.forEach(k => {
                    out[k] = compute(activeData[k]);
                });

                const subBuInputs = subBuKeys.map(k => activeData[k]);
                const fields = ['gmv', 'grossTradeMargin', 'storageLogistics', 'workingCapital', 'capitalCredit', 'marginOtherBU', 'cm2Costs', 'manpower', 'travel', 'other', 'badDebts', 'provReversal'];
                const aggregateInput = {};
                fields.forEach(f => {
                    aggregateInput[f] = subBuInputs.reduce((sum, r) => sum + (r[f] || 0), 0);
                });
                out["dom_fruits"] = compute(aggregateInput);

                return out;
            }, [activeData]);

            const trendData = useMemo(() => {
                if (!rawSheetData.length) return [];
                const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                const targetYear = "20" + year.replace("'", "");
                const currentIdx = months.indexOf(month);
                const results = [];
                
                for(let i = 5; i >= 0; i--) {
                    let mIdx = currentIdx - i;
                    let y = parseInt(targetYear);
                    if (mIdx < 0) { mIdx += 12; y -= 1; }
                    const mName = months[mIdx];
                    const monthMap = { "Jan": "Jan", "Feb": "Feb", "Mar": "March", "Apr": "April", "May": "May", "Jun": "June", "Jul": "July", "Aug": "August", "Sep": "September", "Oct": "October", "Nov": "November", "Dec": "December" };
                    const mFull = (monthMap[mName] || mName).toLowerCase();
                    
                    let tGmv = 0; let tMargin = 0; let tCm3 = 0;
                    rawSheetData.forEach(row => {
                        const rY = String(row['Year'] || "").trim();
                        const rM = (row['Closure'] || "").trim().toLowerCase();
                        if (rY === String(y) && (rM === mFull || rM.includes(mFull))) {
                            tGmv += (parseFloat(row['Sales (GMV)']) || 0) / 100000;
                            tMargin += (parseFloat(row['Margin']) || 0) / 100000;
                        }
                    });

                    results.push({
                        label: `${mName}`,
                        margin: tGmv ? (tMargin / tGmv) * 100 : 0,
                        cm3: tMargin * 0.45 // Synthetic CM3 for historical trend since it's not in raw sheet
                    });
                }
                return results;
            }, [rawSheetData, month, year]);

            const updateInput = (buKey, field, val) => {
                setInputs(prev => ({ ...prev, [buKey]: { ...(prev[buKey] || activeData[buKey]), [field]: parseFloat(val) || 0 } }));
            };

            const consolidated = useMemo(() => {
                return computed[regionFilter] || computed["dom_fruits"];
            }, [computed, regionFilter]);

            const topBU = useMemo(() => {
                const sorted = [...SUB_BUS].sort((a,b) => computed[b.key].netCM3Pct - computed[a.key].netCM3Pct);
                return { name: sorted[0]?.name || "N/A", val: computed[sorted[0]?.key]?.netCM3Pct || 0 };
            }, [computed]);

            const lowBU = useMemo(() => {
                const sorted = [...SUB_BUS].sort((a,b) => computed[a.key].netCM3Pct - computed[b.key].netCM3Pct);
                return { name: sorted[0]?.name || "N/A", val: computed[sorted[0]?.key]?.netCM3Pct || 0 };
            }, [computed]);

            if (loading) return (
                <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center">
                    <Icon name="logo" size={64} className="animate-pulse mb-6" />
                    <h2 className="text-white text-xl font-black tracking-tighter">Syncing P&L Intelligence...</h2>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 text-slate-600 font-sans">
                    <Drawer isOpen={showDrawer} onClose={() => setShowDrawer(false)} inputs={inputs} activeData={activeData} activeBu={activeDrawerBu} onBuChange={setActiveDrawerBu} onUpdate={updateInput} />
                    <MetricModal isOpen={!!selectedMetric} onClose={() => setSelectedMetric(null)} metric={selectedMetric} data={computed} fmt={selectedMetric?.fmt || fmtL} onSelectBu={setSelectedBuDetail} />
                    <BuDetailModal isOpen={!!selectedBuDetail} onClose={() => setSelectedBuDetail(null)} buKey={selectedBuDetail} data={computed} />
                    <SummaryModal isOpen={showSummary} onClose={() => setShowSummary(false)} data={consolidated} trendData={trendData} />
                    <AccountsCenter isOpen={showAccounts} onClose={() => setShowAccounts(false)} />
                    
                    <header className="sticky top-0 z-50 glass-header px-8 py-4 flex items-center justify-between shadow-sm">
                        <div className="flex items-center gap-12">
                            <div className="flex items-center gap-4 group cursor-pointer" onClick={() => setShowDrawer(true)}>
                                <div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform">
                                    <Icon name="menu" size={24} className="text-white" />
                                </div>
                                <div className="flex flex-col">
                                    <h1 className="text-xl font-black tracking-tighter text-slate-900">Ninjacart</h1>
                                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">P&L Intelligence</span>
                                </div>
                            </div>
                            <div className="h-8 w-px bg-black/5"></div>
                            <div className="bg-white/50 px-4 py-2 rounded-2xl border border-black/5 hover:border-indigo-200 transition-all cursor-pointer min-w-[200px]">
                                <CustomSelect 
                                    value={regionFilter} 
                                    options={SUB_BUS} 
                                    onChange={setRegionFilter} 
                                    className="text-xs text-indigo-600" 
                                    icon="filter"
                                />
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                            <button onClick={() => setShowSummary(true)} className="flex items-center gap-2 px-4 py-2 bg-indigo-50 text-indigo-600 rounded-xl border border-indigo-100 hover:bg-indigo-100 transition-all group">
                                <Icon name="sparkles" size={16} className="group-hover:animate-pulse" />
                                <span className="text-[10px] font-black uppercase tracking-widest">Intelligence</span>
                            </button>
                            <div className="flex bg-slate-100 p-1 rounded-2xl border border-black/5">
                                <button className="px-5 py-2 rounded-xl text-xs font-black bg-white text-slate-900 shadow-sm">Actuals</button>
                                <button className="px-5 py-2 rounded-xl text-xs font-black text-slate-400 hover:text-slate-600">Budget</button>
                            </div>
                            <div className="flex items-center gap-2">
                                <CustomSelect 
                                    value={month} 
                                    options={["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"]} 
                                    onChange={setMonth}

                                >
                                    <div className="w-full h-full bg-gradient-to-br from-indigo-500 via-purple-600 to-indigo-700 flex items-center justify-center shadow-inner">
                                        <Icon name="user" size={18} />
                                    </div>
                                </button>

                    </header>

                            </div>

                            <KPI label="Total Sales (GMV)" val={fmtL(consolidated.gmv)} trend="+5.3%" isPos sub="vs Budget" color="orange" onClick={() => setSelectedMetric({label: "GMV", field: "gmv"})} />
                            <KPI label="Gross Margin %" val={fmtPct(consolidated.grossTradeMarginPct)} trend="+0.6%" isPos sub="of Sales" color="emerald" onClick={() => setSelectedMetric({label: "Gross Margin %", field: "grossTradeMarginPct", fmt: fmtPct})} />
                            <KPI label="CM2 Performance" val={fmtL(consolidated.cm2)} trend="+47.4%" isPos sub="Post Logi/Ops" color="blue" onClick={() => setSelectedMetric({label: "CM2", field: "cm2"})} />
                            <KPI label="CM3 Performance" val={fmtL(consolidated.cm3)} trend="+86.9%" isPos sub="Post Field" color="indigo" onClick={() => setSelectedMetric({label: "CM3", field: "cm3"})} />
                            <KPI label="Net CM3 (Post-Prov)" val={fmtL(consolidated.netCM3)} trend="+63.4%" isPos sub="Final Bottomline" color="rose" onClick={() => setSelectedMetric({label: "Net CM3", field: "netCM3"})} />
                        </div>

                        <div className="flex items-center gap-4 bg-slate-50/50 p-2 rounded-[40px] border border-black/5">
                            <ComparisonCard side="left" selectedBu={compareLeft} options={SUB_BUS} onSelect={setCompareLeft} data={computed} />
                            
                            <div className="flex flex-col items-center gap-2 px-4">
                                <div className="w-10 h-10 bg-white border border-black/5 rounded-full flex items-center justify-center shadow-sm">
                                    <span className="text-[10px] font-black text-indigo-600">VS</span>
                                </div>
                                <div className="text-center">
                                    <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest">Delta</p>
                                    <p className={`text-xs font-black ${(computed[compareLeft].netCM3Pct - computed[compareRight].netCM3Pct) >= 0 ? 'text-emerald-600' : 'text-rose-600'}`}>
                                        {((computed[compareLeft].netCM3Pct - computed[compareRight].netCM3Pct)).toFixed(1)}%
                                    </p>
                                </div>
                            </div>

                            <ComparisonCard side="right" selectedBu={compareRight} options={SUB_BUS} onSelect={setCompareRight} data={computed} />
                        </div>
                        <div className="space-y-6">
                            <div className="flex items-center justify-between">
                                <div>
                                    <span className="text-[10px] font-bold text-indigo-600 uppercase tracking-widest mb-1 block">Full P&L Matrix</span>
                                    <h3 className="text-xl font-black tracking-tighter text-slate-900">Consolidated BU Performance</h3>
                                </div>
                                <div className="flex gap-4">
                                    <div className="flex items-center gap-2 px-3 py-1.5 bg-white border border-black/5 rounded-xl shadow-sm">
                                        <div className="w-1.5 h-1.5 bg-indigo-600 rounded-full"></div>
                                        <span className="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Main Aggregate</span>
                                    </div>
                                    <div className="flex items-center gap-2 px-3 py-1.5 bg-white border border-black/5 rounded-xl shadow-sm">
                                        <div className="w-1.5 h-1.5 bg-slate-300 rounded-full"></div>
                                        <span className="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Regional Units</span>
                                    </div>
                                </div>
                            </div>

                            <div className="glass rounded-[32px] overflow-hidden border border-black/5 shadow-premium bg-white">
                                <div className="overflow-x-auto custom-scrollbar">
                                    <table className="w-full text-left pnl-table border-collapse">
                                        <thead>
                                            <tr className="border-b border-black/5">
                                                <th className="px-6 py-4 text-[9px] font-black text-slate-400 uppercase tracking-widest bg-slate-50 sticky left-0 z-10 backdrop-blur-md">Metric Item</th>
                                                {SUB_BUS.map(bu => (
                                                    <th key={bu.key} className={`px-6 py-4 text-[9px] font-black uppercase tracking-widest text-center ${bu.key === 'dom_fruits' ? 'text-indigo-600 bg-indigo-50' : 'text-slate-400'}`}>
                                                        {bu.short}
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-black/5 text-slate-600">
                                            <Row label="Sales (GMV)" field="gmv" data={computed} isBold />

                                            <Row label="Working Capital Cost" field="workingCapital" data={computed} isNegative />

                                            <Row label="Margin from Other BUs (+)" field="marginOtherBU" data={computed} />
                                            <Row label="Net Trade Margin" field="netTradeMargin" data={computed} isBold />
                                            <Row label="Net Trade Margin %" field="netTradeMarginPct" data={computed} isPct />
                                            <Section label="Contribution Margin 2" />
                                            <Row label="CM2 Costs" field="cm2Costs" data={computed} isNegative />
                                            <Row label="CM2 Performance" field="cm2" data={computed} isBold />
                                            <Section label="Contribution Margin 3" />
                                            <Row label="Manpower Cost" field="manpower" data={computed} isNegative />
                                            <Row label="Travel Cost" field="travel" data={computed} isNegative />
                                            <Row label="Other Cost" field="other" data={computed} isNegative />
                                            <Row label="CM3 Performance" field="cm3" data={computed} isBold />
                                            <Row label="CM3 %" field="cm3Pct" data={computed} isPct />
                                            <Section label="Final Bottomline" />
                                            <Row label="Bad Debts / Advances Provision" field="badDebts" data={computed} isNegative />
                                            <Row label="Provision Reversal (+)" field="provReversal" data={computed} />
                                            <Row label="Net CM3 (Post-Prov)" field="netCM3" data={computed} isBold highlight />
                                            <Row label="Final Net CM3 %" field="netCM3Pct" data={computed} isPct highlight />
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                <div className="glass p-8 rounded-[32px] border border-black/5 shadow-premium bg-white">
                                    <div className="mb-8">
                                        <h3 className="text-lg font-black text-slate-900 tracking-tighter">Gross Margin % Trend</h3>
                                        <p className="text-[10px] text-slate-400 font-medium mt-1">Network blended profitability timeline</p>
                                    </div>
                                    <div className="h-[250px] w-full mt-4">
                                        <SimpleTrendChart data={trendData} dataKey="margin" color="#4f46e5" isPct />
                                    </div>
                                </div>
                                <div className="glass p-8 rounded-[32px] border border-black/5 shadow-premium bg-white">
                                    <div className="mb-8">
                                        <h3 className="text-lg font-black text-slate-900 tracking-tighter">CM3 Performance</h3>
                                        <p className="text-[10px] text-slate-400 font-medium mt-1">Monthly contribution margin tier 3 (Lakhs)</p>
                                    </div>
                                    <div className="h-[250px] w-full mt-4">
                                        <SimpleTrendChart data={trendData} dataKey="cm3" color="#059669" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = window.ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
